properties:
  - name: customDictionary
    uid: excel!Excel.CheckSpellingOptions#customDictionary:member
    package: excel!
    fullName: customDictionary
    summary: Optional. A string that indicates the file name of the custom dictionary to be examined if the word isn't found in the main dictionary. If this argument is omitted, Excel's currently specified dictionary is used.
    remarks: '[API set: ExcelApiDesktop 1.1](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)'

    isPreview: false
    isDeprecated: false
    syntax:
      content: 'customDictionary?: string;'
      return:
        type: string
  - name: ignoreUppercase
    uid: excel!Excel.CheckSpellingOptions#ignoreUppercase:member
    package: excel!
    fullName: ignoreUppercase
    summary: Optional. Set to `true` to ignore words that are all uppercase. Set to `false` to check words that are all uppercase. If this argument is omitted, Excel's current setting is used.
    remarks: '[API set: ExcelApiDesktop 1.1](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)'

    isPreview: false
    isDeprecated: false
    syntax:
      content: 'ignoreUppercase?: boolean;'
      return:
        type: boolean
