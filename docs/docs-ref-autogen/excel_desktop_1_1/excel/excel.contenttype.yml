### YamlMime:TSEnum
name: Excel.ContentType
uid: excel!Excel.ContentType:enum
package: excel!
fullName: Excel.ContentType
summary: ''
remarks: |-
  [API set: ExcelApi 1.10](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)



  #### Used by

  - [Excel.Comment](/javascript/api/excel/excel.comment): [contentType](/javascript/api/excel/excel.comment#excel-excel-comment-contenttype-member)
  - [Excel.CommentCollection](/javascript/api/excel/excel.commentcollection): [add](/javascript/api/excel/excel.commentcollection#excel-excel-commentcollection-add-member(1))
  - [Excel.CommentReply](/javascript/api/excel/excel.commentreply): [contentType](/javascript/api/excel/excel.commentreply#excel-excel-commentreply-contenttype-member)
  - [Excel.CommentReplyCollection](/javascript/api/excel/excel.commentreplycollection): [add](/javascript/api/excel/excel.commentreplycollection#excel-excel-commentreplycollection-add-member(1))
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/excel/12-comments-and-notes/comment-mentions.yaml

  await Excel.run(async (context) => {
      const sheet = context.workbook.worksheets.getItem("Comments");
      const mention = {
          email: "kakri@contoso.com",
          id: 0,
          name: "Kate Kristensen"
      };

      // This will tag the mention's name using the '@' syntax.
      // They will be notified via email.
      const commentBody = {
          mentions: [mention],
          richContent: '<at id="0">' + mention.name + "</at> -  Can you take a look?"
      };

      // Note that an InvalidArgument error will be thrown if multiple cells passed to `comment.add`.
      sheet.comments.add("A1", commentBody, Excel.ContentType.mention);
      await context.sync();
  });
  ```

