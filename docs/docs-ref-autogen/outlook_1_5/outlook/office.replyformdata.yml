### YamlMime:TSType
name: Office.ReplyFormData
uid: outlook!Office.ReplyFormData:interface
package: outlook!
fullName: Office.ReplyFormData
summary: A ReplyFormData object that contains body or attachment data and a callback function. Used when displaying a reply form.
remarks: |-
  [API set: Mailbox 1.1](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

  \*\*[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->\*\*: \*\*read item\*\*

  \*\*[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->\*\*: Read

  #### Used by

  - [Office.AppointmentRead](/javascript/api/outlook/office.appointmentread): [displayReplyAllForm](/javascript/api/outlook/office.appointmentread#outlook-office-appointmentread-displayreplyallform-member(1)), [displayReplyForm](/javascript/api/outlook/office.appointmentread#outlook-office-appointmentread-displayreplyform-member(1))
  - [Office.MessageRead](/javascript/api/outlook/office.messageread): [displayReplyAllForm](/javascript/api/outlook/office.messageread#outlook-office-messageread-displayreplyallform-member(1)), [displayReplyForm](/javascript/api/outlook/office.messageread#outlook-office-messageread-displayreplyform-member(1))
example: []
isPreview: false
isDeprecated: false
type: interface
properties:
  - name: attachments
    uid: outlook!Office.ReplyFormData#attachments:member
    package: outlook!
    fullName: attachments
    summary: An array of [ReplyFormAttachment](xref:outlook!Office.ReplyFormAttachment:interface) that are Base64-encoded files, Exchange items, or file attachments.
    remarks: |-
      [API set: Mailbox 1.2](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      \*\*[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->\*\*: \*\*read item\*\*

      \*\*[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->\*\*: Read
    example: []
    isPreview: false
    isDeprecated: false
    syntax:
      content: 'attachments?: ReplyFormAttachment[];'
      return:
        type: <xref uid="outlook!Office.ReplyFormAttachment:interface" />[]
  - name: callback
    uid: outlook!Office.ReplyFormData#callback:member
    package: outlook!
    fullName: callback
    summary: When the reply display call completes, the function passed in the callback parameter is called with a single parameter, `asyncResult`<!-- -->, which is an `Office.AsyncResult` object.
    remarks: |-
      [API set: Mailbox 1.1](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      \*\*[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->\*\*: \*\*read item\*\*

      \*\*[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->\*\*: Read
    example: []
    isPreview: false
    isDeprecated: false
    syntax:
      content: 'callback?: (asyncResult: CommonAPI.AsyncResult<any>) => void;'
      return:
        type: '(asyncResult: <xref uid="office!Office.AsyncResult:interface" />&lt;any&gt;) =&gt; void'
  - name: htmlBody
    uid: outlook!Office.ReplyFormData#htmlBody:member
    package: outlook!
    fullName: htmlBody
    summary: A string that contains text and HTML and that represents the body of the reply form. The string is limited to 32 KB.
    remarks: |-
      [API set: Mailbox 1.1](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      \*\*[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->\*\*: \*\*read item\*\*

      \*\*[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->\*\*: Read
    example: []
    isPreview: false
    isDeprecated: false
    syntax:
      content: 'htmlBody?: string;'
      return:
        type: string
  - name: options
    uid: outlook!Office.ReplyFormData#options:member
    package: outlook!
    fullName: options
    summary: An object literal that contains the `asyncContext` property. Use the `asyncContext` property to specify any object that you want to access in the callback function.
    remarks: |-
      [API set: Mailbox 1.1](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      \*\*[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->\*\*: \*\*read item\*\*

      \*\*[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->\*\*: Read
    example: []
    isPreview: false
    isDeprecated: false
    syntax:
      content: 'options?: CommonAPI.AsyncContextOptions;'
      return:
        type: <xref uid="office!Office.AsyncContextOptions:interface" />
