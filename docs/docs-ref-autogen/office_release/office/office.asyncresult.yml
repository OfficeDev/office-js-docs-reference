properties:
  - name: asyncContext
    uid: office!Office.AsyncResult#asyncContext:member
    package: office!
    fullName: asyncContext
    summary: 'Gets the user-defined item passed to the optional `asyncContext` parameter of the invoked method in the same state as it was passed in. This returns the user-defined item (which can be of any JavaScript type: String, Number, Boolean, Object, Array, Null, or Undefined) passed to the optional `asyncContext` parameter of the invoked method. Returns Undefined, if you didn''t pass anything to the asyncContext parameter.'
    remarks: ''

    isPreview: false
    isDeprecated: false
    syntax:
      content: 'asyncContext: any;'
      return:
        type: any
        description: |-


          #### Examples

          ```TypeScript
          function getDataWithContext() {
              const format = "Your data: ";
              Office.context.document.getSelectedDataAsync(
                  Office.CoercionType.Text, 
                  { asyncContext: format }, 
                  showDataWithContext);
          }

          function showDataWithContext(asyncResult) {
              write(asyncResult.asyncContext + asyncResult.value);
          }
          // Function that writes to a div with id='message' on the page.
          function write(message) {
              document.getElementById('message').innerText += message;
          }
          ```
  - name: diagnostics
