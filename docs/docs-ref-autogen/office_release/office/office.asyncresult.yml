    summary: Gets an object that may provide additional information if an [error](xref:office!Office.Error:interface) occurred.
    remarks: |-
      This property returns additional information if the following errors occur with these supported APIs.

      *Supported APIs*

      `Office.context.mailbox.item.getCallbackTokenAsync`<!-- -->, `Office.context.mailbox.item.getUserIdentityTokenAsync`

      *Supported errors* <table> <tr> <th><code>AsyncResult.error.name</code> </th><th><code>AsyncResult.error.message</code></th> <th>Description of diagnostics object returned</th> </tr> <tr> <td><strong>HTTPRequestFailure</strong></td> <td>The request has failed. Please look at the diagnostics object for the HTTP error code.</td> <td>The HTTP error code in a JSON object e.g., <code>{<!-- -->"HTTPCode":"401"<!-- -->}</code>.</td> </tr> <tr> <td><strong>InternalServerError</strong></td> <td>The Exchange server returned an error. Please look at the diagnostics object for more information.</td> <td>The error message from the Exchange server in a JSON object e.g., <code>{<!-- -->"ErrorText": "The mailbox database is temporarily unavailable"<!-- -->}</code>.</td> </tr> </table>

    isPreview: false
    isDeprecated: false
