  \]

  -
  [Word.ContentControlEnteredEventArgs.eventType](/javascript/api/word/word.contentcontrolenteredeventargs#eventtype-member)
  \]

  -
  [Word.ContentControlExitedEventArgs.eventType](/javascript/api/word/word.contentcontrolexitedeventargs#eventtype-member)
  \]

  -
  [Word.ContentControlSelectionChangedEventArgs.eventType](/javascript/api/word/word.contentcontrolselectionchangedeventargs#eventtype-member)
  \]

  -
  [Word.ParagraphAddedEventArgs.type](/javascript/api/word/word.paragraphaddedeventargs#type-member)
  \]

  -
