### YamlMime:TSType
name: Word.InsertShapeOptions
uid: word!Word.InsertShapeOptions:interface
package: word!
fullName: Word.InsertShapeOptions
summary: Specifies the options to determine location and size when inserting a shape.
remarks: |-
  [API set: WordApiDesktop 1.2](/javascript/api/requirement-sets/word/word-api-requirement-sets)


  #### Used by

  - [Word.Paragraph](/javascript/api/word/word.paragraph): [insertCanvas](/javascript/api/word/word.paragraph#word-word-paragraph-insertcanvas-member(1)), [insertGeometricShape](/javascript/api/word/word.paragraph#word-word-paragraph-insertgeometricshape-member(1)), [insertPictureFromBase64](/javascript/api/word/word.paragraph#word-word-paragraph-insertpicturefrombase64-member(1)), [insertTextBox](/javascript/api/word/word.paragraph#word-word-paragraph-inserttextbox-member(1))
  - [Word.Range](/javascript/api/word/word.range): [insertCanvas](/javascript/api/word/word.range#word-word-range-insertcanvas-member(1)), [insertGeometricShape](/javascript/api/word/word.range#word-word-range-insertgeometricshape-member(1)), [insertPictureFromBase64](/javascript/api/word/word.range#word-word-range-insertpicturefrombase64-member(1)), [insertTextBox](/javascript/api/word/word.range#word-word-range-inserttextbox-member(1))
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/45-shapes/manage-shapes-text-boxes.yaml

  await Word.run(async (context) => {
    // Inserts a text box at the beginning of the selection.
    const range: Word.Range = context.document.getSelection();
    const insertShapeOptions: Word.InsertShapeOptions = {
      top: 0,
      left: 0,
      height: 100,
      width: 100
    };

    const newTextBox: Word.Shape = range.insertTextBox("placeholder text", insertShapeOptions);
    await context.sync();

    console.log("Inserted a text box at the beginning of the current selection.");
  });
  ```

