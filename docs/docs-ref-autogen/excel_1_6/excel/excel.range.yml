  - name: values
    uid: excel!Excel.Range#values:member
    package: excel!
    fullName: values
    summary: >-
      Represents the raw values of the specified range. The data returned could
      be a string, number, or Boolean. Cells that contain an error will return
      the error string. If the returned value starts with a plus ("+"), minus
      ("-"), or equal sign ("="), Excel interprets this value as a formula.
      Locale-shaped strings (such as the date "19-8-2025" in nl-NL or fr-FR,
      format DD-MM-YYYY) are stored as text instead of as dates. To ensure dates
      are stored as dates, use a locale-aware API like `formulasLocal` or use a
      locale-neutral format like ISO (YYYY-MM-DD) or a numeric date serial.
    remarks: >-
      [API set: ExcelApi
      1.1](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)


