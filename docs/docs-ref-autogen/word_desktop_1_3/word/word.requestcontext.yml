### YamlMime:TSType
name: Word.RequestContext
uid: word!Word.RequestContext:class
package: word!
fullName: Word.RequestContext
summary: The RequestContext object facilitates requests to the Word application. Since the Office add-in and the Word application run in two different processes, the request context is required to get access to the Word object model from the add-in.
