name: Word.LanguageId
uid: word!Word.LanguageId:enum
package: word!
fullName: Word.LanguageId
summary: Represents the language ID of a Word document.
remarks: |-
  [API set: WordApiDesktop 1.3](/javascript/api/requirement-sets/word/word-api-requirement-sets)

  #### Used by

  - [Word.Application](/javascript/api/word/word.application): [language](/javascript/api/word/word.application#word-word-application-language-member)
  - [Word.DatePickerContentControl](/javascript/api/word/word.datepickercontentcontrol): [dateDisplayLocale](/javascript/api/word/word.datepickercontentcontrol#word-word-datepickercontentcontrol-datedisplaylocale-member)
  - [Word.Range](/javascript/api/word/word.range): [languageId](/javascript/api/word/word.range#word-word-range-languageid-member), [languageIdFarEast](/javascript/api/word/word.range#word-word-range-languageidfareast-member), [languageIdOther](/javascript/api/word/word.range#word-word-range-languageidother-member)
