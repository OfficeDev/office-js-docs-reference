  - [Word.Template](/javascript/api/word/word.template): [languageId](/javascript/api/word/word.template#word-word-template-languageid-member), [languageIdFarEast](/javascript/api/word/word.template#word-word-template-languageidfareast-member)
example: []
isPreview: false
isDeprecated: false
