name: PowerPoint.ShapeZOrder
uid: powerpoint!PowerPoint.ShapeZOrder:enum
package: powerpoint!
fullName: PowerPoint.ShapeZOrder
summary: Use with `setZOrder` to move the specified shape up or down the collection's z-order, which shifts it in front of or behind other shapes.
remarks: |-
  [API set: PowerPointApi 1.8](/javascript/api/requirement-sets/powerpoint/powerpoint-api-requirement-sets)

  #### Used by

  - [PowerPoint.Shape](/javascript/api/powerpoint/powerpoint.shape): [setZOrder](/javascript/api/powerpoint/powerpoint.shape#powerpoint-powerpoint-shape-setzorder-member(1))
example: []
isPreview: false
isDeprecated: false
fields:
  - name: bringForward
    uid: powerpoint!PowerPoint.ShapeZOrder.bringForward:member
    package: powerpoint!
    summary: Brings the shape forward one spot in the z-order.
    value: '"BringForward"'
  - name: bringToFront
    uid: powerpoint!PowerPoint.ShapeZOrder.bringToFront:member
    package: powerpoint!
    summary: Brings the shape to the front of the z-order.
    value: '"BringToFront"'
  - name: sendBackward
    uid: powerpoint!PowerPoint.ShapeZOrder.sendBackward:member
    package: powerpoint!
    summary: Sends the shape backward one spot in the z-order.
