name: Office.BindingType
uid: office!Office.BindingType:enum
package: office!
fullName: Office.BindingType
summary: Specifies the type of the binding object that should be returned.
remarks: >-
  #### Used by


  - <xref href="office!Office.Binding#type:member">Office.Binding.type</xref>

  - <xref
  href="office!Office.Bindings#addFromNamedItemAsync:member(1)">Office.Bindings.addFromNamedItemAsync</xref>

  - <xref
  href="office!Office.Bindings#addFromPromptAsync:member(1)">Office.Bindings.addFromPromptAsync</xref>

  - <xref
