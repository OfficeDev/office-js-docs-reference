### YamlMime:TSEnum
name: Office.ValueFormat
uid: office!Office.ValueFormat:enum
package: office!
fullName: Office.ValueFormat
summary: Specifies whether values, such as numbers and dates, returned by the invoked method are returned with their formatting applied.
remarks: |-
  For example, if the valueFormat parameter is specified as "formatted", a number formatted as currency, or a date formatted as mm/dd/yy in the Office application will have its formatting preserved. If the valueFormat parameter is specified as "unformatted", a date will be returned in its underlying sequential serial number form.

  #### Used by

  - [Office.GetBindingDataOptions](/javascript/api/office/office.getbindingdataoptions): [valueFormat](/javascript/api/office/office.getbindingdataoptions#office-office-getbindingdataoptions-valueformat-member)
  - [Office.GetSelectedDataOptions](/javascript/api/office/office.getselecteddataoptions): [valueFormat](/javascript/api/office/office.getselecteddataoptions#office-office-getselecteddataoptions-valueformat-member)
example: []
isPreview: false
isDeprecated: false
fields:
  - name: Formatted
    uid: office!Office.ValueFormat.Formatted:member
    package: office!
    summary: Return formatted data.
  - name: Unformatted
    uid: office!Office.ValueFormat.Unformatted:member
    package: office!
    summary: Return unformatted data.
