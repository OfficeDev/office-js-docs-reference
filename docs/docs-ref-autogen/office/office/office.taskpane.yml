methods:
  - name: setWidth(width)
    uid: office!Office.TaskPane#setWidth:member(1)
    package: office!
    fullName: setWidth(width)
    summary: >-
      Sets the width of the task pane of an add-in in pixels.


      **Requirement set**: [TaskPaneAPI
      1.1](https://learn.microsoft.com/javascript/api/requirement-sets/common/task-pane-api-requirement-sets)


      **Important**:


      - The default size of the task pane of an add-in is 320 px.


      - If you pass a width beyond the minimum and maximum constraints, the task
      pane isn't resized and no error is shown.
    remarks: ''

    isPreview: false
    isDeprecated: false
    syntax:
      content: 'setWidth(width: number): void;'
      parameters:
        - id: width
          description: >-
            The width of a task pane in pixels. Must be between 320 and 500 px
            (inclusive).
          type: number
      return:
        type: void
        description: ''
