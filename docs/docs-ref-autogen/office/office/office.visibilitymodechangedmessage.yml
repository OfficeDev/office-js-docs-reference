name: Office.VisibilityModeChangedMessage
uid: office!Office.VisibilityModeChangedMessage:interface
package: office!
fullName: Office.VisibilityModeChangedMessage
summary: Message used in the `onVisibilityModeChanged` invocation.
remarks: |-
  #### Examples

  ```TypeScript
  Office.onReady(() => {
      Office.addin.onVisibilityModeChanged((args: Office.VisibilityModeChangedMessage) => {
          if (args.visibilityMode === Office.VisibilityMode.taskpane) {
              // Do something when the task pane is visible.
          }
      });

      // Other startup tasks.
  });
  ```

