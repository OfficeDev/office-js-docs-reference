### YamlMime:TSEnum
name: Office.StartupBehavior
uid: office!Office.StartupBehavior:enum
package: office!
fullName: Office.StartupBehavior
summary: Provides options to determine the startup behavior of the add-in upon next start-up.
remarks: |-



  #### Used by

  - [Office.Addin](/javascript/api/office/office.addin): [getStartupBehavior](/javascript/api/office/office.addin#office-office-addin-getstartupbehavior-member(1)), [setStartupBehavior](/javascript/api/office/office.addin#office-office-addin-setstartupbehavior-member(1))
  #### Examples

  ```TypeScript
  // Configure your add-in to load and start running when the document is opened.
  Office.addin.setStartupBehavior(Office.StartupBehavior.load);
  ```

isPreview: false
isDeprecated: false
fields:
  - name: load
    uid: office!Office.StartupBehavior.load:member
    package: office!
    summary: Load the add-in but do not show UI.
    value: '''Load'''
  - name: none
    uid: office!Office.StartupBehavior.none:member
    package: office!
    summary: The add-in does not load until opened by the user.
    value: '''None'''
