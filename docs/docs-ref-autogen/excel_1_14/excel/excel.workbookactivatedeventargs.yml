### YamlMime:TSType
name: Excel.WorkbookActivatedEventArgs
uid: excel!Excel.WorkbookActivatedEventArgs:interface
package: excel!
fullName: Excel.WorkbookActivatedEventArgs
summary: Provides information about the workbook that raised the activated event.
remarks: >-
  \[ [API set: ExcelApi
  1.13](/javascript/api/requirement-sets/excel/excel-api-requirement-sets) \]


  #### Examples


  ```TypeScript

  async function registerEventHandler() {
      await Excel.run(async (context) => {
          // Register the workbook activated event handler.
          const workbook = context.workbook;
          workbook.onActivated.add(workbookActivated);
          await context.sync();
      });
  }


  async function workbookActivated(event: Excel.WorkbookActivatedEventArgs) {
      await Excel.run(async (context) => {
          // Callback function for when the workbook is activated.
          console.log("The workbook was activated.");
      });
  }

  ```

