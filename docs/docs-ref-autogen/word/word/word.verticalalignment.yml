### YamlMime:TSEnum
name: Word.VerticalAlignment
uid: word!Word.VerticalAlignment:enum
package: word!
fullName: Word.VerticalAlignment
summary: Represents the vertical alignment of text.
remarks: |-
  [API set: WordApi 1.3](/javascript/api/requirement-sets/word/word-api-requirement-sets)



  #### Used by

  - [Word.Table](/javascript/api/word/word.table): [verticalAlignment](/javascript/api/word/word.table#word-word-table-verticalalignment-member)
  - [Word.TableCell](/javascript/api/word/word.tablecell): [verticalAlignment](/javascript/api/word/word.tablecell#word-word-tablecell-verticalalignment-member)
  - [Word.TableRow](/javascript/api/word/word.tablerow): [verticalAlignment](/javascript/api/word/word.tablerow#word-word-tablerow-verticalalignment-member)
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/40-tables/manage-formatting.yaml

  // Gets content alignment details about the first row of the first table in the document.
  await Word.run(async (context) => {
    const firstTable: Word.Table = context.document.body.tables.getFirst();
    const firstTableRow: Word.TableRow = firstTable.rows.getFirst();
    firstTableRow.load(["horizontalAlignment", "verticalAlignment"]);
    await context.sync();

    console.log(
      `Details about the alignment of the first table's first row:`,
      `- Horizontal alignment of every cell in the row: ${firstTableRow.horizontalAlignment}`,
      `- Vertical alignment of every cell in the row: ${firstTableRow.verticalAlignment}`,
    );
  });
  ```

isPreview: false
isDeprecated: false
