### YamlMime:TSEnum
name: Word.EventSource
uid: word!Word.EventSource:enum
package: word!
fullName: Word.EventSource
summary: An enum that specifies an event's source. It can be local or remote (through coauthoring).
remarks: |-
  [API set: WordApi 1.5](/javascript/api/requirement-sets/word/word-api-requirement-sets)


  #### Used by

  - [Word.CommentEventArgs](/javascript/api/word/word.commenteventargs): [source](/javascript/api/word/word.commenteventargs#word-word-commenteventargs-source-member)
  - [Word.ContentControlAddedEventArgs](/javascript/api/word/word.contentcontroladdedeventargs): [source](/javascript/api/word/word.contentcontroladdedeventargs#word-word-contentcontroladdedeventargs-source-member)
  - [Word.ContentControlDataChangedEventArgs](/javascript/api/word/word.contentcontroldatachangedeventargs): [source](/javascript/api/word/word.contentcontroldatachangedeventargs#word-word-contentcontroldatachangedeventargs-source-member)
  - [Word.ContentControlDeletedEventArgs](/javascript/api/word/word.contentcontroldeletedeventargs): [source](/javascript/api/word/word.contentcontroldeletedeventargs#word-word-contentcontroldeletedeventargs-source-member)
  - [Word.ContentControlEnteredEventArgs](/javascript/api/word/word.contentcontrolenteredeventargs): [source](/javascript/api/word/word.contentcontrolenteredeventargs#word-word-contentcontrolenteredeventargs-source-member)
  - [Word.ContentControlExitedEventArgs](/javascript/api/word/word.contentcontrolexitedeventargs): [source](/javascript/api/word/word.contentcontrolexitedeventargs#word-word-contentcontrolexitedeventargs-source-member)
  - [Word.ContentControlSelectionChangedEventArgs](/javascript/api/word/word.contentcontrolselectionchangedeventargs): [source](/javascript/api/word/word.contentcontrolselectionchangedeventargs#word-word-contentcontrolselectionchangedeventargs-source-member)
  - [Word.ParagraphAddedEventArgs](/javascript/api/word/word.paragraphaddedeventargs): [source](/javascript/api/word/word.paragraphaddedeventargs#word-word-paragraphaddedeventargs-source-member)
  - [Word.ParagraphChangedEventArgs](/javascript/api/word/word.paragraphchangedeventargs): [source](/javascript/api/word/word.paragraphchangedeventargs#word-word-paragraphchangedeventargs-source-member)
  - [Word.ParagraphDeletedEventArgs](/javascript/api/word/word.paragraphdeletedeventargs): [source](/javascript/api/word/word.paragraphdeletedeventargs#word-word-paragraphdeletedeventargs-source-member)
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/99-preview-apis/manage-comments.yaml

  // Registers event handlers.
  await Word.run(async (context) => {
    const body: Word.Body = context.document.body;
    body.track();
    await context.sync();

    eventContexts[0] = body.onCommentAdded.add(onEventHandler);
    eventContexts[1] = body.onCommentChanged.add(onChangedHandler);
    eventContexts[2] = body.onCommentDeleted.add(onEventHandler);
    eventContexts[3] = body.onCommentDeselected.add(onEventHandler);
    eventContexts[4] = body.onCommentSelected.add(onEventHandler);
    await context.sync();

    console.log("Event handlers registered.");
  });

  ...

  async function onEventHandler(event: Word.CommentEventArgs) {
    // Handler for all events except onCommentChanged.
    await Word.run(async (context) => {
      console.log(`${event.type} event detected. Event source: ${event.source}. Comment info:`, event.commentDetails);
    });
  }
  ```

