### YamlMime:TSEnum
name: Word.ExportItem
uid: word!Word.ExportItem:enum
package: word!
fullName: Word.ExportItem
summary: Specifies the export item type for a Word document.
remarks: |-
  [API set: WordApiDesktop 1.4](/javascript/api/requirement-sets/word/word-api-requirement-sets)


  #### Used by

  - [Word.DocumentExportAsFixedFormat2Options](/javascript/api/word/word.documentexportasfixedformat2options): [item](/javascript/api/word/word.documentexportasfixedformat2options#word-word-documentexportasfixedformat2options-item-member)
  - [Word.DocumentExportAsFixedFormat3Options](/javascript/api/word/word.documentexportasfixedformat3options): [item](/javascript/api/word/word.documentexportasfixedformat3options#word-word-documentexportasfixedformat3options-item-member)
  - [Word.DocumentExportAsFixedFormatOptions](/javascript/api/word/word.documentexportasfixedformatoptions): [item](/javascript/api/word/word.documentexportasfixedformatoptions#word-word-documentexportasfixedformatoptions-item-member)
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/99-preview-apis/export.yaml

  await Word.run(async (context) => {
    const document: Word.Document = context.document;

    // Export the current document as a PDF saved in your default location, usually Documents.
    const filename = `exported-doc-${getCurrentDate()}.pdf`;
    console.log(`File name: ${filename}`);
    const options: Word.DocumentExportAsFixedFormatOptions = {
      item: Word.ExportItem.documentContent,
      openAfterExport: true,
      optimizeFor: Word.ExportOptimizeFor.onScreen,
    };

    // If a file with the same name already exists at the default location, it's silently overwritten.
    document.exportAsFixedFormat(filename, Word.ExportFormat.pdf, options);

    await context.sync();
  });
  ```

