### YamlMime:TSEnum
name: Word.ExportOptimizeFor
uid: word!Word.ExportOptimizeFor:enum
package: word!
fullName: Word.ExportOptimizeFor
summary: Specifies the optimization target for document export.
remarks: |-
  [API set: WordApiDesktop 1.4](/javascript/api/requirement-sets/word/word-api-requirement-sets)


  #### Used by

  - [Word.DocumentExportAsFixedFormat2Options](/javascript/api/word/word.documentexportasfixedformat2options): [optimizeFor](/javascript/api/word/word.documentexportasfixedformat2options#word-word-documentexportasfixedformat2options-optimizefor-member)
  - [Word.DocumentExportAsFixedFormat3Options](/javascript/api/word/word.documentexportasfixedformat3options): [optimizeFor](/javascript/api/word/word.documentexportasfixedformat3options#word-word-documentexportasfixedformat3options-optimizefor-member)
  - [Word.DocumentExportAsFixedFormatOptions](/javascript/api/word/word.documentexportasfixedformatoptions): [optimizeFor](/javascript/api/word/word.documentexportasfixedformatoptions#word-word-documentexportasfixedformatoptions-optimizefor-member)
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/99-preview-apis/export.yaml

  await Word.run(async (context) => {
    const document: Word.Document = context.document;

    // Export the current document as a PDF saved in your default location, usually Documents.
    const filename = `exported-doc-${getCurrentDate()}.pdf`;
    console.log(`File name: ${filename}`);
    const options: Word.DocumentExportAsFixedFormatOptions = {
      item: Word.ExportItem.documentContent,
      openAfterExport: true,
      optimizeFor: Word.ExportOptimizeFor.onScreen,
    };

    // If a file with the same name already exists at the default location, it's silently overwritten.
    document.exportAsFixedFormat(filename, Word.ExportFormat.pdf, options);

    await context.sync();
  });
  ```

