name: Word.SensitivityLabelUpdateResult
uid: word!Word.SensitivityLabelUpdateResult:enum
package: word!
fullName: Word.SensitivityLabelUpdateResult
summary: Represents the result of updating the sensitivity label on the document.
remarks: |-
  [API set: WordApi BETA (PREVIEW ONLY)](/javascript/api/requirement-sets/word/word-api-requirement-sets)

  #### Used by

  - [Word.SensitivityLabel](/javascript/api/word/word.sensitivitylabel): [tryToUpdate](/javascript/api/word/word.sensitivitylabel#word-word-sensitivitylabel-trytoupdate-member(1))
example: []
isPreview: true
isDeprecated: false
fields:
  - name: crossTenant
    uid: word!Word.SensitivityLabelUpdateResult.crossTenant:member
    package: word!
    summary: The label update failed because the document doesn't belong to the same tenant as the user.
    value: '"CrossTenant"'
  - name: documentReadOnly
    uid: word!Word.SensitivityLabelUpdateResult.documentReadOnly:member
    package: word!
    summary: The document is read-only and cannot be modified.
    value: '"DocumentReadOnly"'
  - name: insufficientPermission
    uid: word!Word.SensitivityLabelUpdateResult.insufficientPermission:member
    package: word!
    summary: The user does not have sufficient permissions to update the label.
    value: '"InsufficientPermission"'
  - name: labelingDisabled
    uid: word!Word.SensitivityLabelUpdateResult.labelingDisabled:member
    package: word!
