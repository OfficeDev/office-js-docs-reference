### YamlMime:TSEnum
name: Word.FontBias
uid: word!Word.FontBias:enum
package: word!
fullName: Word.FontBias
summary: Specifies the font bias to use when formatting East Asian text.
remarks: >-
  \[ [API set: WordApiDesktop
  1.4](/javascript/api/requirement-sets/word/word-api-requirement-sets) \]


  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/55-selection/insert-symbol.yaml


  // Inserts a Wingdings checkmark (ANSI character 252) at the selection.

  // The font option selects the symbol font, unicode: false uses the ANSI code
  point,

  // and bias: Word.FontBias.standard ensures the standard (non-East-Asian)
  glyph is used.

  await Word.run(async (context) => {
    const options: Word.SelectionInsertSymbolOptions = {
      font: "Wingdings",
      unicode: false,
      bias: Word.FontBias.standard,
    };
    context.document.selection.insertSymbol(252, options);
    await context.sync();

    console.log("Inserted Wingdings checkmark (character 252).");
  });

  ```

isPreview: false
isDeprecated: false
