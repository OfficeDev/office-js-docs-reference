### YamlMime:TSType
name: Excel.WorksheetCalculatedEventArgs
uid: excel!Excel.WorksheetCalculatedEventArgs:interface
package: excel!
fullName: Excel.WorksheetCalculatedEventArgs
summary: Provides information about the worksheet that raised the calculated event.
remarks: |-
  [API set: ExcelApi 1.8](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)


  #### Used by

  - [Excel.Worksheet](/javascript/api/excel/excel.worksheet): [onCalculated](/javascript/api/excel/excel.worksheet#excel-excel-worksheet-oncalculated-member)
  - [Excel.WorksheetCollection](/javascript/api/excel/excel.worksheetcollection): [onCalculated](/javascript/api/excel/excel.worksheetcollection#excel-excel-worksheetcollection-oncalculated-member)
  #### Examples

  ```TypeScript
  async function registerOnCalculatedHandler() {
      await Excel.run(async (context) => {
          let sheet = context.workbook.worksheets.getItem("Sample");
          sheet.onCalculated.add(onCalculated);
          await context.sync();
      });
  }

  async function onCalculated(event: Excel.WorksheetCalculatedEventArgs) {
      await Excel.run(async (context) => {
          // `event.address` returns the address of the range that completed calculation.
          // If multiple ranges completed calculation, the string is a comma-separated list of those range addresses.
          console.log(`The Range ${event.address} has recalculated.`);
      });
  }
  ```

