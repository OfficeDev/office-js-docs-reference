name: Excel.LinkedEntityDataDomainRefreshModeChangedEventArgs
uid: excel!Excel.LinkedEntityDataDomainRefreshModeChangedEventArgs:interface
package: excel!
fullName: Excel.LinkedEntityDataDomainRefreshModeChangedEventArgs
summary: Provides information about the linked entity data domain whose refresh mode was changed.
remarks: |-
  [API set: ExcelApi 1.19](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)

  This interface isn't supported in Excel on the web.

  #### Used by

  - [Excel.LinkedEntityDataDomainCollection](/javascript/api/excel/excel.linkedentitydatadomaincollection): [onRefreshModeChanged](/javascript/api/excel/excel.linkedentitydatadomaincollection#excel-excel-linkedentitydatadomaincollection-onrefreshmodechanged-member)

  #### Examples

  ```TypeScript
  // Registers an event handler for the onRefreshModeChanged event.
  await Excel.run(async (context) => {
      const dataDomains: Excel.LinkedEntityDataDomainCollection = context.workbook.linkedEntityDataDomains;
      dataDomains.onRefreshModeChanged.add(onRefreshModeChanged);

      await context.sync();
  });

  async function onRefreshModeChanged(eventArgs: Excel.LinkedEntityDataDomainRefreshModeChangedEventArgs): Promise<void> {
      console.log(`Linked entity domain refresh mode changed: ${eventArgs.id}`);
      console.log(`Event type: ${eventArgs.type}`);
      console.log(`Event source: ${eventArgs.source}`);
      console.log(`Service ID: ${eventArgs.serviceId}`);
      console.log(`New refresh mode: ${eventArgs.refreshMode}`);
  }
  ```

