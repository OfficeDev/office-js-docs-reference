### YamlMime:TSType
name: Excel.ListDataValidation
uid: excel!Excel.ListDataValidation:interface
package: excel!
fullName: Excel.ListDataValidation
summary: Represents the List data validation criteria.
remarks: |-
  [API set: ExcelApi 1.8](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)

  #### Used by

  - [Excel.DataValidationRule](/javascript/api/excel/excel.datavalidationrule): [list](/javascript/api/excel/excel.datavalidationrule#excel-excel-datavalidationrule-list-member)

  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/excel/22-data-validation/data-validation-types.yaml

  function applyList(sheet: Excel.Worksheet) {
      // Value must be chosen from the predefined list.
      const listRule: Excel.ListDataValidation = {
          inCellDropDown: true,
          source: "Apple,Banana,Cherry"
      };
      const rule: Excel.DataValidationRule = { list: listRule };
      sheet.getRange("B4").dataValidation.rule = rule;
  }
  ```

