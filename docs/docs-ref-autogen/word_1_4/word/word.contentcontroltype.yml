### YamlMime:TSEnum
name: Word.ContentControlType
uid: word!Word.ContentControlType:enum
package: word!
fullName: Word.ContentControlType
summary: Specifies supported content control types and subtypes.
remarks: |-
  [API set: WordApi 1.1](/javascript/api/requirement-sets/word/word-api-requirement-sets)



  #### Used by

  - [Word.ContentControl](/javascript/api/word/word.contentcontrol): [subtype](/javascript/api/word/word.contentcontrol#word-word-contentcontrol-subtype-member), [type](/javascript/api/word/word.contentcontrol#word-word-contentcontrol-type-member)
  - [Word.ContentControlCollection](/javascript/api/word/word.contentcontrolcollection): [getByTypes](/javascript/api/word/word.contentcontrolcollection#word-word-contentcontrolcollection-getbytypes-member(1))
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/10-content-controls/insert-and-change-checkbox-content-control.yaml

  // Traverses each paragraph of the document and places a checkbox content control at the beginning of each.
  await Word.run(async (context) => {
    let paragraphs = context.document.body.paragraphs;
    paragraphs.load("$none"); // Don't need any properties; just start each paragraph with a content control.

    await context.sync();

    for (let i = 0; i < paragraphs.items.length; i++) {
      let contentControl = paragraphs.items[i]
        .getRange(Word.RangeLocation.start)
        .insertContentControl(Word.ContentControlType.checkBox);
    }
    console.log("Checkbox content controls inserted: " + paragraphs.items.length);

    await context.sync();
  });
  ```

