### YamlMime:TSEnum
name: Word.InsertLocation
uid: word!Word.InsertLocation:enum
package: word!
fullName: Word.InsertLocation
summary: Represents the insertion location type.
remarks: |-
  [API set: WordApi 1.1](/javascript/api/requirement-sets/word/word-api-requirement-sets)

  To be used with an API call, such as `obj.insertSomething(newStuff, location);`<!-- -->. If the location is `before` or `after`<!-- -->, the new content will be outside of the modified object. If the location is `start` or `end`<!-- -->, the new content will be included as part of the modified object.

  #### Used by

  - [Word.CommentContentRange](/javascript/api/word/word.commentcontentrange): [insertText](/javascript/api/word/word.commentcontentrange#word-word-commentcontentrange-inserttext-member(1))
  - [Word.Range](/javascript/api/word/word.range): [insertFileFromBase64](/javascript/api/word/word.range#word-word-range-insertfilefrombase64-member(1)), [insertHtml](/javascript/api/word/word.range#word-word-range-inserthtml-member(1)), [insertInlinePictureFromBase64](/javascript/api/word/word.range#word-word-range-insertinlinepicturefrombase64-member(1)), [insertOoxml](/javascript/api/word/word.range#word-word-range-insertooxml-member(1)), [insertText](/javascript/api/word/word.range#word-word-range-inserttext-member(1))
example: []
isPreview: false
isDeprecated: false
fields:
  - name: after
    uid: word!Word.InsertLocation.after:member
    package: word!
    summary: Add content after the contents of the calling object.
    value: '"After"'
  - name: before
    uid: word!Word.InsertLocation.before:member
    package: word!
    summary: Add content before the contents of the calling object.
    value: '"Before"'
  - name: end
    uid: word!Word.InsertLocation.end:member
    package: word!
    summary: Append content to the contents of the calling object.
    value: '"End"'
  - name: replace
    uid: word!Word.InsertLocation.replace:member
    package: word!
    summary: Replace the contents of the current object.
    value: '"Replace"'
  - name: start
    uid: word!Word.InsertLocation.start:member
    package: word!
    summary: Prepend content to the contents of the calling object.
    value: '"Start"'
