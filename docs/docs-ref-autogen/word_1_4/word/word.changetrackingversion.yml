### YamlMime:TSEnum
name: Word.ChangeTrackingVersion
uid: word!Word.ChangeTrackingVersion:enum
package: word!
fullName: Word.ChangeTrackingVersion
summary: Specify the current version or the original version of the text.
remarks: |-
  [API set: WordApi 1.4](/javascript/api/requirement-sets/word/word-api-requirement-sets)


  #### Used by

  - [Word.Body](/javascript/api/word/word.body): [getReviewedText](/javascript/api/word/word.body#word-word-body-getreviewedtext-member(1))
  - [Word.ContentControl](/javascript/api/word/word.contentcontrol): [getReviewedText](/javascript/api/word/word.contentcontrol#word-word-contentcontrol-getreviewedtext-member(1))
  - [Word.Paragraph](/javascript/api/word/word.paragraph): [getReviewedText](/javascript/api/word/word.paragraph#word-word-paragraph-getreviewedtext-member(1))
  - [Word.Range](/javascript/api/word/word.range): [getReviewedText](/javascript/api/word/word.range#word-word-range-getreviewedtext-member(1))
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/50-document/manage-change-tracking.yaml

  // Gets the reviewed text.
  await Word.run(async (context) => {
    const range: Word.Range = context.document.getSelection();
    const before = range.getReviewedText(Word.ChangeTrackingVersion.original);
    const after = range.getReviewedText(Word.ChangeTrackingVersion.current);

    await context.sync();

    console.log("Reviewed text (before):", before.value, "Reviewed text (after):", after.value);
  });
  ```

