### YamlMime:TSType
name: Excel.DataValidationRule
uid: excel!Excel.DataValidationRule:interface
package: excel!
fullName: Excel.DataValidationRule
summary: A data validation rule contains different types of data validation. You can only use one of them at a time according the `Excel.DataValidationType`<!-- -->.
remarks: |-
  [API set: ExcelApi 1.8](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)

  #### Used by

  - [Excel.DataValidation](/javascript/api/excel/excel.datavalidation): [rule](/javascript/api/excel/excel.datavalidation#excel-excel-datavalidation-rule-member)

isPreview: false
isDeprecated: false
type: interface
properties:
  - name: custom
    uid: excel!Excel.DataValidationRule#custom:member
    package: excel!
    fullName: custom
    summary: Custom data validation criteria.
    remarks: |-
      [API set: ExcelApi 1.8](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)

      #### Examples

      ```TypeScript
      // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/excel/22-data-validation/data-validation-types.yaml

      function applyCustom(sheet: Excel.Worksheet) {
          // Custom formula: Value in B8 must not duplicate any value already in B2:B7.
          const customRule: Excel.CustomDataValidation = {
              formula: "=COUNTIF($B$2:$B$7,B8)=0"
          };
          const rule: Excel.DataValidationRule = { custom: customRule };
          sheet.getRange("B8").dataValidation.rule = rule;
      }
      ```

    isPreview: false
    isDeprecated: false
    syntax:
      content: 'custom?: Excel.CustomDataValidation;'
      return:
        type: <xref uid="excel!Excel.CustomDataValidation:interface" />
  - name: date
    uid: excel!Excel.DataValidationRule#date:member
    package: excel!
    fullName: date
    summary: Date data validation criteria.
    remarks: |-
      [API set: ExcelApi 1.8](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)

      #### Examples

      ```TypeScript
      // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/excel/22-data-validation/data-validation-types.yaml

      function applyDate(sheet: Excel.Worksheet) {
          // Date must be on or after January 1, 2000.
          const basicRule: Excel.DateTimeDataValidation = {
              formula1: "1/1/2000",
              operator: Excel.DataValidationOperator.greaterThanOrEqualTo
          };
          const rule: Excel.DataValidationRule = { date: basicRule };
          sheet.getRange("B5").dataValidation.rule = rule;
      }
      ```

    isPreview: false
    isDeprecated: false
    syntax:
      content: 'date?: Excel.DateTimeDataValidation;'
      return:
        type: <xref uid="excel!Excel.DateTimeDataValidation:interface" />
  - name: decimal
    uid: excel!Excel.DataValidationRule#decimal:member
    package: excel!
    fullName: decimal
    summary: Decimal data validation criteria.
    remarks: |-
      [API set: ExcelApi 1.8](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)

      #### Examples

      ```TypeScript
      // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/excel/22-data-validation/data-validation-types.yaml

      function applyDecimal(sheet: Excel.Worksheet) {
          // Decimal values between 0 and 10 are allowed.
          const basicRule: Excel.BasicDataValidation = {
              formula1: 0,
              formula2: 10,
              operator: Excel.DataValidationOperator.between
          };
          const rule: Excel.DataValidationRule = { decimal: basicRule };
          sheet.getRange("B3").dataValidation.rule = rule;
      }
      ```

    isPreview: false
