### YamlMime:TSEnum
name: Excel.ShapeAutoSize
uid: excel!Excel.ShapeAutoSize:enum
package: excel!
fullName: Excel.ShapeAutoSize
summary: Determines the type of automatic sizing allowed.
remarks: >-
  \[ [API set: ExcelApi
  1.9](/javascript/api/requirement-sets/excel/excel-api-requirement-sets) \]



  #### Used by


  - <xref
  href="excel!Excel.Interfaces.TextFrameData#autoSizeSetting:member">Excel.Interfaces.TextFrameData.autoSizeSetting</xref>

  - <xref
  href="excel!Excel.Interfaces.TextFrameUpdateData#autoSizeSetting:member">Excel.Interfaces.TextFrameUpdateData.autoSizeSetting</xref>

  - <xref
  href="excel!Excel.TextFrame#autoSizeSetting:member">Excel.TextFrame.autoSizeSetting</xref>

  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/excel/44-shape/shape-textboxes.yaml


  await Excel.run(async (context) => {
      const shapes = context.workbook.worksheets.getItem("Shapes").shapes;
      const textbox = shapes.getItem("Textbox");
      textbox.textFrame.autoSizeSetting = Excel.ShapeAutoSize.autoSizeShapeToFitText;
      await context.sync();
  });

  ```

