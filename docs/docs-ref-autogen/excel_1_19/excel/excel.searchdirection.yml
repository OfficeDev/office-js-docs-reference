### YamlMime:TSEnum
name: Excel.SearchDirection
uid: excel!Excel.SearchDirection:enum
package: excel!
fullName: Excel.SearchDirection
summary: Specifies the search direction.
remarks: |-
  [API set: ExcelApi 1.9](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)

  #### Used by

  - [Excel.SearchCriteria](/javascript/api/excel/excel.searchcriteria): [searchDirection](/javascript/api/excel/excel.searchcriteria#excel-excel-searchcriteria-searchdirection-member)

  #### Examples

  ```TypeScript
  await Excel.run(async (context) => {
      const sheet = context.workbook.worksheets.getItem("Sample");
      const table = sheet.tables.getItem("ExpensesTable");
      const searchRange = table.getRange();
      
      // Search for cells that exactly match "TODO", ignoring case, and starting from the top-left of the range and going forward.
      const searchCriteria: Excel.SearchCriteria = {
          completeMatch: true,
          matchCase: false,
          searchDirection: Excel.SearchDirection.forward
      };
      const foundRange = searchRange.findOrNullObject("TODO", searchCriteria);
      foundRange.load("address");
      await context.sync();

      if (foundRange.isNullObject) {
          console.log("Text not found");
      } else {
          console.log(foundRange.address);
      }
  });
  ```

