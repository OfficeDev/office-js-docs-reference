### YamlMime:TSType
name: Word.RequestContext
uid: word!Word.RequestContext:class
package: word!
fullName: Word.RequestContext
summary: >-
  The RequestContext object facilitates requests to the Word application. Since
  the Office add-in and the Word application run in two different processes, the
  request context is required to get access to the Word object model from the
  add-in.
remarks: >-



  #### Used by


  - [Word.Application.context](/javascript/api/word/word.application#context-member)

  - [Word.Body.context](/javascript/api/word/word.body#context-member)

  - [Word.ContentControl.context](/javascript/api/word/word.contentcontrol#context-member)

  - [Word.ContentControlCollection.context](/javascript/api/word/word.contentcontrolcollection#context-member)

  - [Word.CustomProperty.context](/javascript/api/word/word.customproperty#context-member)

  - [Word.CustomPropertyCollection.context](/javascript/api/word/word.custompropertycollection#context-member)

  - [Word.Document.context](/javascript/api/word/word.document#context-member)

  - [Word.DocumentCreated.context](/javascript/api/word/word.documentcreated#context-member)

  - [Word.DocumentProperties.context](/javascript/api/word/word.documentproperties#context-member)

  - [Word.Font.context](/javascript/api/word/word.font#context-member)

  - [Word.InlinePicture.context](/javascript/api/word/word.inlinepicture#context-member)

  - [Word.InlinePictureCollection.context](/javascript/api/word/word.inlinepicturecollection#context-member)

  - [Word.List.context](/javascript/api/word/word.list#context-member)

  - [Word.ListCollection.context](/javascript/api/word/word.listcollection#context-member)

  - [Word.ListItem.context](/javascript/api/word/word.listitem#context-member)

  - [Word.Paragraph.context](/javascript/api/word/word.paragraph#context-member)

  - [Word.ParagraphCollection.context](/javascript/api/word/word.paragraphcollection#context-member)

  - [Word.Range.context](/javascript/api/word/word.range#context-member)

  - [Word.RangeCollection.context](/javascript/api/word/word.rangecollection#context-member)

  - [Word.SearchOptions.context](/javascript/api/word/word.searchoptions#context-member)

  - [Word.Section.context](/javascript/api/word/word.section#context-member)

  - [Word.SectionCollection.context](/javascript/api/word/word.sectioncollection#context-member)

  - [Word.Style.context](/javascript/api/word/word.style#context-member)

  - [Word.Table.context](/javascript/api/word/word.table#context-member)

  - [Word.TableBorder.context](/javascript/api/word/word.tableborder#context-member)

  - [Word.TableCell.context](/javascript/api/word/word.tablecell#context-member)

  - [Word.TableCellCollection.context](/javascript/api/word/word.tablecellcollection#context-member)

