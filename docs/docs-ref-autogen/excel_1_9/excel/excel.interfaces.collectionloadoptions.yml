properties:
  - name: $skip
    uid: excel!Excel.Interfaces.CollectionLoadOptions#$skip:member
    package: excel!
    fullName: $skip
    summary: Specify the number of items in the collection that are to be skipped and not included in the result. If top is specified, the selection of result will start after skipping the specified number of items.
    remarks: ''

    isPreview: false
    isDeprecated: false
    syntax:
      content: '$skip?: number;'
      return:
        type: number
  - name: $top
    uid: excel!Excel.Interfaces.CollectionLoadOptions#$top:member
    package: excel!
    fullName: $top
    summary: Specify the number of items in the queried collection to be included in the result.
    remarks: ''

    isPreview: false
    isDeprecated: false
    syntax:
      content: '$top?: number;'
      return:
        type: number
