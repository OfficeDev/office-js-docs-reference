  - name: untrack()
    uid: excel!Excel.Range#untrack:member(1)
    package: excel!
    fullName: untrack()
    summary: Release the memory associated with this object, if it has previously been tracked. This call is shorthand for [context.trackedObjects.remove(thisObject)](https://learn.microsoft.com/javascript/api/office/officeextension.clientrequestcontext#office-officeextension-clientrequestcontext-trackedobjects-member)<!-- -->. Having many tracked objects slows down the host application, so please remember to free any objects you add, once you're done using them. You'll need to call `context.sync()` before the memory release takes effect.
    remarks: ''

    isPreview: false
    isDeprecated: false
    syntax:
      content: 'untrack(): Excel.Range;'
      return:
        type: <xref uid="excel!Excel.Range:class" />
        description: |-


          #### Examples

          ```TypeScript
          await Excel.run(async (context) => {
              const largeRange = context.workbook.getSelectedRange();
              largeRange.load(["rowCount", "columnCount"]);
              await context.sync();

              for (let i = 0; i < largeRange.rowCount; i++) {
                  for (let j = 0; j < largeRange.columnCount; j++) {
                      const cell = largeRange.getCell(i, j);
                      cell.values = [[i *j]];

                      // Call untrack() to release the range from memory.
                      cell.untrack();
                  }
              }

              await context.sync();
          });
          ```
