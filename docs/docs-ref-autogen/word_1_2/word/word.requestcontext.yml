### YamlMime:TSType
name: Word.RequestContext
uid: word!Word.RequestContext:class
package: word!
fullName: Word.RequestContext
summary: >-
  The RequestContext object facilitates requests to the Word application. Since
  the Office add-in and the Word application run in two different processes, the
  request context is required to get access to the Word object model from the
  add-in.
remarks: >-



  #### Used by


  - <xref uid="word!Word.Body#context:member" alttext="Word.Body.context" />

  - <xref uid="word!Word.ContentControl#context:member"
  alttext="Word.ContentControl.context" />

  - <xref uid="word!Word.ContentControlCollection#context:member"
  alttext="Word.ContentControlCollection.context" />

  - <xref uid="word!Word.Document#context:member"
  alttext="Word.Document.context" />

  - <xref uid="word!Word.Font#context:member" alttext="Word.Font.context" />

  - <xref uid="word!Word.InlinePicture#context:member"
  alttext="Word.InlinePicture.context" />

  - <xref uid="word!Word.InlinePictureCollection#context:member"
  alttext="Word.InlinePictureCollection.context" />

  - <xref uid="word!Word.Paragraph#context:member"
  alttext="Word.Paragraph.context" />

  - <xref uid="word!Word.ParagraphCollection#context:member"
  alttext="Word.ParagraphCollection.context" />

  - <xref uid="word!Word.Range#context:member" alttext="Word.Range.context" />

  - <xref uid="word!Word.RangeCollection#context:member"
  alttext="Word.RangeCollection.context" />

  - <xref uid="word!Word.SearchOptions#context:member"
  alttext="Word.SearchOptions.context" />

  - <xref uid="word!Word.Section#context:member" alttext="Word.Section.context"
  />

  - <xref uid="word!Word.SectionCollection#context:member"
  alttext="Word.SectionCollection.context" />

  #### Examples


  ```TypeScript

  // *.run methods automatically create an OfficeExtension.ClientRequestContext

  // object to work with the Office file.

  await Word.run(async (context: Word.RequestContext) => {
    const document = context.document;
    // Interact with the Word document...
  });

  ```

