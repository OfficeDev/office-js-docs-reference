### YamlMime:TSType
name: Word.RequestContext
uid: word!Word.RequestContext:class
package: word!
fullName: Word.RequestContext
summary: The RequestContext object facilitates requests to the Word application. Since the Office add-in and the Word application run in two different processes, the request context is required to get access to the Word object model from the add-in.
remarks: |-



  #### Used by

  - [Word](/javascript/api/word): [run](/javascript/api/word#word-word-run-function(1))
  - [Word.Body](/javascript/api/word/word.body): [context](/javascript/api/word/word.body#word-word-body-context-member)
  - [Word.ContentControl](/javascript/api/word/word.contentcontrol): [context](/javascript/api/word/word.contentcontrol#word-word-contentcontrol-context-member)
  - [Word.ContentControlCollection](/javascript/api/word/word.contentcontrolcollection): [context](/javascript/api/word/word.contentcontrolcollection#word-word-contentcontrolcollection-context-member)
  - [Word.Document](/javascript/api/word/word.document): [context](/javascript/api/word/word.document#word-word-document-context-member)
  - [Word.Font](/javascript/api/word/word.font): [context](/javascript/api/word/word.font#word-word-font-context-member)
  - [Word.InlinePicture](/javascript/api/word/word.inlinepicture): [context](/javascript/api/word/word.inlinepicture#word-word-inlinepicture-context-member)
  - [Word.InlinePictureCollection](/javascript/api/word/word.inlinepicturecollection): [context](/javascript/api/word/word.inlinepicturecollection#word-word-inlinepicturecollection-context-member)
  - [Word.Paragraph](/javascript/api/word/word.paragraph): [context](/javascript/api/word/word.paragraph#word-word-paragraph-context-member)
  - [Word.ParagraphCollection](/javascript/api/word/word.paragraphcollection): [context](/javascript/api/word/word.paragraphcollection#word-word-paragraphcollection-context-member)
  - [Word.Range](/javascript/api/word/word.range): [context](/javascript/api/word/word.range#word-word-range-context-member)
  - [Word.RangeCollection](/javascript/api/word/word.rangecollection): [context](/javascript/api/word/word.rangecollection#word-word-rangecollection-context-member)
  - [Word.SearchOptions](/javascript/api/word/word.searchoptions): [context](/javascript/api/word/word.searchoptions#word-word-searchoptions-context-member)
  - [Word.Section](/javascript/api/word/word.section): [context](/javascript/api/word/word.section#word-word-section-context-member)
  - [Word.SectionCollection](/javascript/api/word/word.sectioncollection): [context](/javascript/api/word/word.sectioncollection#word-word-sectioncollection-context-member)
  #### Examples

  ```TypeScript
  // *.run methods automatically create an OfficeExtension.ClientRequestContext
  // object to work with the Office file.
  await Word.run(async (context: Word.RequestContext) => {
    const document = context.document;
    // Interact with the Word document...
  });
  ```

