### YamlMime:TSEnum
name: Excel.DataValidationAlertStyle
uid: excel!Excel.DataValidationAlertStyle:enum
package: excel!
fullName: Excel.DataValidationAlertStyle
summary: Represents the data validation error alert style. The default is `Stop`<!-- -->.
remarks: |-
  [API set: ExcelApi 1.8](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)


  #### Used by

  - [Excel.DataValidationErrorAlert](/javascript/api/excel/excel.datavalidationerroralert): [style](/javascript/api/excel/excel.datavalidationerroralert#excel-excel-datavalidationerroralert-style-member)
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/excel/22-data-validation/data-validation.yaml

  await Excel.run(async (context) => {
      const sheet = context.workbook.worksheets.getItem("Decision");
      const rankingRange = sheet.tables.getItem("NameOptionsTable").columns.getItem("Ranking").getDataBodyRange();

      // When you are developing, it is a good practice to
      // clear the dataValidation object with each run of your code.
      rankingRange.dataValidation.clear();

      let greaterThanZeroRule = {
          wholeNumber: {
              formula1: 0,
              operator: Excel.DataValidationOperator.greaterThan
          }
      };
      rankingRange.dataValidation.rule = greaterThanZeroRule;

      rankingRange.dataValidation.prompt = {
          message: "Please enter a positive number.",
          showPrompt: true,
          title: "Positive numbers only."
      };

      rankingRange.dataValidation.errorAlert = {
          message: "Sorry, only positive numbers are allowed",
          showAlert: true,
          style: Excel.DataValidationAlertStyle.stop,
          title: "Negative Number Entered"
      };

      await context.sync();
  });
  ```

