name: Office.MailboxEnums.ItemType
uid: outlook!Office.MailboxEnums.ItemType:enum
package: outlook!
fullName: Office.MailboxEnums.ItemType
summary: Specifies an item's type.
remarks: >-
  **[Applicable Outlook
  mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!--
  -->**: Compose or Read



  #### Used by


  -
  [Office.AppointmentCompose.itemType](/javascript/api/outlook/office.appointmentcompose#itemtype-member)
  \]

  -
  [Office.AppointmentRead.itemType](/javascript/api/outlook/office.appointmentread#itemtype-member)
  \]

  -
  [Office.LoadedMessageCompose.itemType](/javascript/api/outlook/office.loadedmessagecompose#itemtype-member)
  \]

  -
  [Office.LoadedMessageRead.itemType](/javascript/api/outlook/office.loadedmessageread#itemtype-member)
  \]

  -
  [Office.MessageCompose.itemType](/javascript/api/outlook/office.messagecompose#itemtype-member)
  \]

  -
  [Office.MessageRead.itemType](/javascript/api/outlook/office.messageread#itemtype-member)
  \]

  -
  [Office.SelectedItemDetails.itemType](/javascript/api/outlook/office.selecteditemdetails#itemtype-member)
  \]

  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/outlook/90-other-item-apis/get-item-type.yaml


  const itemType = Office.context.mailbox.item.itemType;

  switch (itemType) {
      case Office.MailboxEnums.ItemType.Appointment:
          console.log(`Current item is an ${itemType}.`);
          break;
      case Office.MailboxEnums.ItemType.Message:
          console.log(`Current item is a ${itemType}. A message could be an email, meeting request, meeting response, or meeting cancellation.`);
          break;
  }

  ```

