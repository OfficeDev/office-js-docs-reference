### YamlMime:TSEnum
name: Office.MailboxEnums.ItemType
uid: outlook!Office.MailboxEnums.ItemType:enum
package: outlook!
fullName: Office.MailboxEnums.ItemType
summary: Specifies an item's type.
remarks: |-
  **[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->**: Compose or Read



  #### Used by

  - [Office.AppointmentCompose](/javascript/api/outlook/office.appointmentcompose): [itemType](/javascript/api/outlook/office.appointmentcompose#outlook-office-appointmentcompose-itemtype-member)
  - [Office.AppointmentRead](/javascript/api/outlook/office.appointmentread): [itemType](/javascript/api/outlook/office.appointmentread#outlook-office-appointmentread-itemtype-member)
  - [Office.LoadedMessageCompose](/javascript/api/outlook/office.loadedmessagecompose): [itemType](/javascript/api/outlook/office.loadedmessagecompose#outlook-office-loadedmessagecompose-itemtype-member)
  - [Office.LoadedMessageRead](/javascript/api/outlook/office.loadedmessageread): [itemType](/javascript/api/outlook/office.loadedmessageread#outlook-office-loadedmessageread-itemtype-member)
  - [Office.MessageCompose](/javascript/api/outlook/office.messagecompose): [itemType](/javascript/api/outlook/office.messagecompose#outlook-office-messagecompose-itemtype-member)
  - [Office.MessageRead](/javascript/api/outlook/office.messageread): [itemType](/javascript/api/outlook/office.messageread#outlook-office-messageread-itemtype-member)
  - [Office.SelectedItemDetails](/javascript/api/outlook/office.selecteditemdetails): [itemType](/javascript/api/outlook/office.selecteditemdetails#outlook-office-selecteditemdetails-itemtype-member)
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/outlook/90-other-item-apis/get-item-type.yaml

  const itemType = Office.context.mailbox.item.itemType;
  switch (itemType) {
      case Office.MailboxEnums.ItemType.Appointment:
          console.log(`Current item is an ${itemType}.`);
          break;
      case Office.MailboxEnums.ItemType.Message:
          console.log(`Current item is a ${itemType}. A message could be an email, meeting request, meeting response, or meeting cancellation.`);
          break;
  }
  ```

