name: Office.AccessControls
uid: outlook!Office.AccessControls:interface
package: outlook!
fullName: Office.AccessControls
summary: Represents access controls that specify whether the decrypted contents of a message can be copied and pasted, printed, or saved.
remarks: |-
  [API set: Mailbox preview](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

  #### Used by

  - [Office.MessageDecryptEventCompletedOptions](/javascript/api/outlook/office.messagedecrypteventcompletedoptions): [accessControls](/javascript/api/outlook/office.messagedecrypteventcompletedoptions#outlook-office-messagedecrypteventcompletedoptions-accesscontrols-member)

isPreview: true
isDeprecated: false
type: interface
properties:
  - name: allowCopyPaste
    uid: outlook!Office.AccessControls#allowCopyPaste:member
    package: outlook!
    fullName: allowCopyPaste
    summary: If true, specifies that the decrypted contents of a message can be copied and pasted.
    remarks: |-
      [API set: Mailbox preview](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      **Important**:

      - In Outlook on the web, setting the `allowCopyPaste` property to `false` also prevents users from capturing their screen in the form of screenshots or recordings. The screen capture policy remains in effect until the user reloads the Outlook browser tab.

      - In Outlook on the web and the new Outlook on Windows, setting the `allowCopyPaste` property to `true` allows the user to copy content by selecting **Copy** from the context menu or pressing `Ctrl+C`<!-- -->. However, if another access control is set to `false`<!-- -->, the context menu becomes unavailable. The user must use `Ctrl+C` instead.

    isPreview: true
    isDeprecated: false
    syntax:
      content: 'allowCopyPaste?: boolean;'
      return:
        type: boolean
