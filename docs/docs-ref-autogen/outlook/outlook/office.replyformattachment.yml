  - name: type
    uid: outlook!Office.ReplyFormAttachment#type:member
    package: outlook!
    fullName: type
    summary: Indicates the type of attachment.
    remarks: |-
      [API set: Mailbox 1.1](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      \*\*[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->\*\*: \*\*read item\*\*

      \*\*[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->\*\*: Read

      \*\*Important\*\*:

      - The `base64` attachment type was introduced in Mailbox requirement set 1.15. It's only supported by the `displayReplyAllForm`<!-- -->, `displayReplyAllFormAsync`<!-- -->, `displayReplyForm`<!-- -->, and `displayReplyFormAsync` methods.

      - The `cloud` attachment type isn't supported by the `displayNewMessageForm`<!-- -->, `displayNewMessageFormAsync`<!-- -->, `displayReplyAllForm`<!-- -->, `displayReplyAllFormAsync`<!-- -->, `displayReplyForm`<!-- -->, and `displayReplyFormAsync` methods.
    example: []
    isPreview: false
    isDeprecated: false
    syntax:
      content: 'type: MailboxEnums.AttachmentType;'
      return:
        type: <xref uid="outlook!Office.MailboxEnums.AttachmentType:enum" />
  - name: url
    uid: outlook!Office.ReplyFormAttachment#url:member
    package: outlook!
    fullName: url
    summary: The URI of the location for the file. Only use if `type` is set to `file`<!-- -->.
    remarks: |-
      [API set: Mailbox 1.1](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      \*\*[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->\*\*: \*\*read item\*\*

      \*\*[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->\*\*: Read

      \*\*Important\*\*: This link must be publicly accessible without need for authentication by Exchange Online servers. However, with on-premises Exchange, the link can be accessible on a private network as long as it doesn't need further authentication.
    example: []
    isPreview: false
    isDeprecated: false
    syntax:
      content: 'url?: string;'
      return:
        type: string
