name: Office.InlinePictures
uid: outlook!Office.InlinePictures:interface
package: outlook!
fullName: Office.InlinePictures
summary: Provides methods to manage inline pictures in the body of the message or appointment.
remarks: |-
  [API set: Mailbox preview](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

  **[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->**: **read/write item**

  **[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->**: Compose

  #### Used by

  - [Office.Body](/javascript/api/outlook/office.body): [pictures](/javascript/api/outlook/office.body#outlook-office-body-pictures-member)

isPreview: true
isDeprecated: false
type: interface
methods:
  - name: deleteAsync(id, options, callback)
    uid: outlook!Office.InlinePictures#deleteAsync:member(1)
    package: outlook!
    fullName: deleteAsync(id, options, callback)
    summary: Removes the specified inline picture from the mail item.
    remarks: |-
      [API set: Mailbox preview](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      **[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->**: **read item**

      **[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->**: Compose

    isPreview: true
    isDeprecated: false
    syntax:
      content: 'deleteAsync(id: string, options: Office.AsyncContextOptions, callback?: (asyncResult: Office.AsyncResult<void>) => void): void;'
      parameters:
        - id: id
          description: The identifier of the inline picture.
          type: string
        - id: options
          description: An object literal that contains the `asyncContext` property. Use the `asyncContext` property to specify any object you want to access in the callback function.
          type: <xref uid="office!Office.AsyncContextOptions:interface" />
        - id: callback
          description: |-
            Optional. When the method completes, the function passed in the `callback` parameter is called with a single parameter, `asyncResult`<!-- -->. The `asyncResult` parameter is an `Office.AsyncResult` object.

            **Important**: To get the ID of the inline picture, call the `getAllAsync` method.
          type: '(asyncResult: <xref uid="office!Office.AsyncResult:interface" />&lt;void&gt;) =&gt; void'
      return:
        type: void
        description: ''
