  - name: getAsBase64Async(id, options, callback)
    uid: outlook!Office.InlinePictures#getAsBase64Async:member(1)
    package: outlook!
    fullName: getAsBase64Async(id, options, callback)
    summary: Gets the Base64-encoded string of the inline picture.
    remarks: |-
      [API set: Mailbox preview](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      **[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->**: **read item**

      **[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->**: Compose

      **Important**:

      - To get the ID of the inline picture, call the `getAllAsync` method.

      - The `getAsBase64Async` method doesn't support inline pictures that are externally linked (that is, pictures whose `sourceType` is `Office.MailboxEnums.PictureSourceType.Url`<!-- -->).

    isPreview: true
    isDeprecated: false
    syntax:
      content: 'getAsBase64Async(id: string, options: Office.AsyncContextOptions, callback: (asyncResult: Office.AsyncResult<string>) => void): void;'
      parameters:
        - id: id
          description: The identifier of the inline picture.
          type: string
        - id: options
          description: An object literal that contains the `asyncContext` property. Use the `asyncContext` property to specify any object you want to access in the callback function.
          type: <xref uid="office!Office.AsyncContextOptions:interface" />
        - id: callback
          description: When the method completes, the function passed in the `callback` parameter is called with a single parameter, `asyncResult`<!-- -->. The `asyncResult` parameter is an `Office.AsyncResult` object. The Base64-encoded string of the inline picture is returned in the `asyncResult.value` property.
          type: '(asyncResult: <xref uid="office!Office.AsyncResult:interface" />&lt;string&gt;) =&gt; void'
      return:
        type: void
        description: ''
  - name: getAsBase64Async(id, callback)
    uid: outlook!Office.InlinePictures#getAsBase64Async:member(2)
    package: outlook!
    fullName: getAsBase64Async(id, callback)
    summary: Gets the Base64-encoded string of the inline picture.
    remarks: |-
      [API set: Mailbox preview](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      **[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->**: **read item**

      **[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->**: Compose

      **Important**:

      - To get the ID of the inline picture, call the `getAllAsync` method.

      - The `getAsBase64Async` method doesn't support inline pictures that are externally linked (that is, pictures whose `sourceType` is `Office.MailboxEnums.PictureSourceType.Url`<!-- -->).

      **Errors**:

      - `PermissionDenied`<!-- -->: A Base64-encoded string can't be generated for an externally linked inline picture.

    isPreview: true
    isDeprecated: false
    syntax:
      content: 'getAsBase64Async(id: string, callback: (asyncResult: Office.AsyncResult<string>) => void): void;'
      parameters:
        - id: id
          description: The identifier of the inline picture.
          type: string
        - id: callback
          description: When the method completes, the function passed in the `callback` parameter is called with a single parameter, `asyncResult`<!-- -->. The `asyncResult` parameter is an `Office.AsyncResult` object. The Base64-encoded string of the inline picture is returned in the `asyncResult.value` property.
          type: '(asyncResult: <xref uid="office!Office.AsyncResult:interface" />&lt;string&gt;) =&gt; void'
      return:
        type: void
        description: ''
