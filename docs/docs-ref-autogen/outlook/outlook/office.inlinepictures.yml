  - name: getAllAsync(options, callback)
    uid: outlook!Office.InlinePictures#getAllAsync:member(1)
    package: outlook!
    fullName: getAllAsync(options, callback)
    summary: Gets all inline pictures in the body of the mail item. Inline pictures are returned in the order of their appearance in the body.
    remarks: |-
      [API set: Mailbox preview](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

      **[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->**: **read item**

      **[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->**: Compose

    isPreview: true
    isDeprecated: false
    syntax:
      content: 'getAllAsync(options: Office.AsyncContextOptions & { waitForContentId?: boolean }, callback: (asyncResult: Office.AsyncResult<Picture[]>) => void): void;'
      parameters:
        - id: options
          description: 'An object literal that contains the following properties. `asyncContext`<!-- -->: Use the `asyncContext` property to specify any object you want to access in the callback function. `waitForContentId`<!-- -->: Optional. If true, indicates that an inline picture in Outlook on the web and the new Outlook on Windows must have a content ID assigned to it before the results of the `getAllAsync` method are returned. In Outlook on the web and the new Outlook on Windows, inline attachments are assigned a temporary ID prefixed with `addinId` while the attachments are uploaded to the server. Once the images are uploaded to the server, they''re then assigned an Exchange Web Services (EWS) ID. If the `waitForContentId` option isn''t specified, the method returns the inline pictures regardless of whether they have a content ID.'
          type: '<xref uid="office!Office.AsyncContextOptions:interface" /> & { waitForContentId?: boolean }'
        - id: callback
          description: When the method completes, the function passed in the `callback` parameter is called with a single parameter, `asyncResult`<!-- -->. The `asyncResult` parameter is an `Office.AsyncResult` object. An array of inline pictures is returned in the `asyncResult.value` property. The inline pictures are returned in the order of their appearance in the body of the mail item.
          type: '(asyncResult: <xref uid="office!Office.AsyncResult:interface" />&lt;<xref uid="outlook!Office.Picture:interface" />[]&gt;) =&gt; void'
      return:
        type: void
        description: ''
