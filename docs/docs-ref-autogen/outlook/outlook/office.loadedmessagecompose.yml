      on Windows](https://support.microsoft.com/office/656bb8d9-5a60-49b2-a98b-ba7822bc7627)<!-- -->, the API call
      returns `true` if the signature is enabled for compose types `newMail`<!-- -->, `reply`<!-- -->, or `forward`<!--
      -->. If the settings are set to "(none)" in Outlook on Windows (classic) or on Mac, or disabled in Outlook on the
      web or new Outlook on Windows, the API call returns `false`<!-- -->.
