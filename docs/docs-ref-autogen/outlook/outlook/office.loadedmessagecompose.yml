### YamlMime:TSType
name: Office.LoadedMessageCompose
uid: 'outlook!Office.LoadedMessageCompose:interface'
package: outlook!
fullName: Office.LoadedMessageCompose
summary: >-
  When multiple messages are selected in Outlook, represents a selected message in compose mode that's currently loaded.
  A `LoadedMessageCompose` object is returned when `Office.context.mailbox.loadItemByIdAsync` is called on a selected
  message in compose mode. To learn more, see [Activate your Outlook add-in on multiple
  messages](https://learn.microsoft.com/office/dev/add-ins/outlook/item-multi-select)<!-- -->.
remarks: >-
  \[ [API set: Mailbox preview](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets) \]


  **[Minimum permission
  level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->**:
  **read/write item**


  **[Applicable Outlook
  mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->**:
  Message Compose


  **Important**:


  - Before you implement the `loadItemByIdAsync` method, determine if you can already access the required properties of
  the selected item through the `Office.context.mailbox.getSelectedItemsAsync` call. If you can, you don't need to call
  `loadItemByIdAsync`<!-- -->.


  - Only one selected mail item can be loaded at a time. When you implement `loadItemByIdAsync`<!-- -->, you must call
  `unloadAsync` after processing the selected item. This must be done before calling `loadItemByIdAsync` on another
  selected item.
isPreview: true
isDeprecated: false
type: interface
