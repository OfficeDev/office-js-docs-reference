### YamlMime:TSEnum
name: Word.VerticalAlignment
uid: word!Word.VerticalAlignment:enum
package: word!
fullName: Word.VerticalAlignment
summary: Represents the vertical alignment of text.
remarks: >-
  \[ [API set: WordApi
  1.3](/javascript/api/requirement-sets/word/word-api-requirement-sets) \]



  #### Used by


  - \[
  [Word.Interfaces.TableCellData.verticalAlignment](/javascript/api/word/word.interfaces.tablecelldata#verticalalignment-member)
  \]

  - \[
  [Word.Interfaces.TableCellUpdateData.verticalAlignment](/javascript/api/word/word.interfaces.tablecellupdatedata#verticalalignment-member)
  \]

  - \[
  [Word.Interfaces.TableData.verticalAlignment](/javascript/api/word/word.interfaces.tabledata#verticalalignment-member)
  \]

  - \[
  [Word.Interfaces.TableRowData.verticalAlignment](/javascript/api/word/word.interfaces.tablerowdata#verticalalignment-member)
  \]

  - \[
  [Word.Interfaces.TableRowUpdateData.verticalAlignment](/javascript/api/word/word.interfaces.tablerowupdatedata#verticalalignment-member)
  \]

  - \[
  [Word.Interfaces.TableUpdateData.verticalAlignment](/javascript/api/word/word.interfaces.tableupdatedata#verticalalignment-member)
  \]

  - \[
  [Word.Table.verticalAlignment](/javascript/api/word/word.table#verticalalignment-member)
  \]

  - \[
  [Word.TableCell.verticalAlignment](/javascript/api/word/word.tablecell#verticalalignment-member)
  \]

  - \[
  [Word.TableRow.verticalAlignment](/javascript/api/word/word.tablerow#verticalalignment-member)
  \]

  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/40-tables/manage-formatting.yaml


  // Gets content alignment details about the first row of the first table in
  the document.

  await Word.run(async (context) => {
    const firstTable: Word.Table = context.document.body.tables.getFirst();
    const firstTableRow: Word.TableRow = firstTable.rows.getFirst();
    firstTableRow.load(["horizontalAlignment", "verticalAlignment"]);
    await context.sync();

    console.log(
      `Details about the alignment of the first table's first row:`,
      `- Horizontal alignment of every cell in the row: ${firstTableRow.horizontalAlignment}`,
      `- Vertical alignment of every cell in the row: ${firstTableRow.verticalAlignment}`,
    );
  });

  ```

