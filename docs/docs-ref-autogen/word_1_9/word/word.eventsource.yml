  alttext="Word.ContentControlDataChangedEventArgs.source" />

  - <xref uid="word!Word.ContentControlDeletedEventArgs#source:member"
  alttext="Word.ContentControlDeletedEventArgs.source" />

  - <xref uid="word!Word.ContentControlEnteredEventArgs#source:member"
  alttext="Word.ContentControlEnteredEventArgs.source" />

  - <xref uid="word!Word.ContentControlExitedEventArgs#source:member"
  alttext="Word.ContentControlExitedEventArgs.source" />

  - <xref uid="word!Word.ContentControlSelectionChangedEventArgs#source:member"
  alttext="Word.ContentControlSelectionChangedEventArgs.source" />

  - <xref uid="word!Word.ParagraphAddedEventArgs#source:member"
  alttext="Word.ParagraphAddedEventArgs.source" />

  - <xref uid="word!Word.ParagraphChangedEventArgs#source:member"
  alttext="Word.ParagraphChangedEventArgs.source" />

  - <xref uid="word!Word.ParagraphDeletedEventArgs#source:member"
  alttext="Word.ParagraphDeletedEventArgs.source" />

  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/99-preview-apis/manage-comments.yaml


  // Registers event handlers.

  await Word.run(async (context) => {
    const body: Word.Body = context.document.body;
    body.track();
    await context.sync();

    eventContexts[0] = body.onCommentAdded.add(onEventHandler);
    eventContexts[1] = body.onCommentChanged.add(onChangedHandler);
    eventContexts[2] = body.onCommentDeleted.add(onEventHandler);
    eventContexts[3] = body.onCommentDeselected.add(onEventHandler);
    eventContexts[4] = body.onCommentSelected.add(onEventHandler);
    await context.sync();

    console.log("Event handlers registered.");
  });


  ...


  async function onEventHandler(event: Word.CommentEventArgs) {
    // Handler for all events except onCommentChanged.
    await Word.run(async (context) => {
      console.log(`${event.type} event detected. Event source: ${event.source}. Comment info:`, event.commentDetails);
    });
  }

  ```

