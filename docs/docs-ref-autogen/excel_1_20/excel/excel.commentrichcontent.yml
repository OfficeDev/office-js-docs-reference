name: Excel.CommentRichContent
uid: excel!Excel.CommentRichContent:interface
package: excel!
fullName: Excel.CommentRichContent
summary: Represents the content contained within a comment or comment reply. Rich content incudes the text string and any other objects contained within the comment body, such as mentions.
remarks: |-
  [API set: ExcelApi 1.11](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)

  #### Used by

  - [Excel.Comment](/javascript/api/excel/excel.comment): [updateMentions](/javascript/api/excel/excel.comment#excel-excel-comment-updatementions-member(1))
  - [Excel.CommentCollection](/javascript/api/excel/excel.commentcollection): [add](/javascript/api/excel/excel.commentcollection#excel-excel-commentcollection-add-member(1))
  - [Excel.CommentReply](/javascript/api/excel/excel.commentreply): [updateMentions](/javascript/api/excel/excel.commentreply#excel-excel-commentreply-updatementions-member(1))
  - [Excel.CommentReplyCollection](/javascript/api/excel/excel.commentreplycollection): [add](/javascript/api/excel/excel.commentreplycollection#excel-excel-commentreplycollection-add-member(1))
example: []
isPreview: false
isDeprecated: false
