### YamlMime:TSEnum
name: Excel.ChartSeriesBy
uid: excel!Excel.ChartSeriesBy:enum
package: excel!
fullName: Excel.ChartSeriesBy
summary: Specifies whether the series are by rows or by columns. In Excel on desktop, the "auto" option will inspect the source data shape to automatically guess whether the data is by rows or columns. In Excel on the web, "auto" will simply default to "columns".
remarks: |-
  [API set: ExcelApi 1.1](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)

  #### Used by

  - [Excel.Chart](/javascript/api/excel/excel.chart): [setData](/javascript/api/excel/excel.chart#excel-excel-chart-setdata-member(1))
  - [Excel.ChartCollection](/javascript/api/excel/excel.chartcollection): [add](/javascript/api/excel/excel.chartcollection#excel-excel-chartcollection-add-member(1))
example: []
isPreview: false
isDeprecated: false
