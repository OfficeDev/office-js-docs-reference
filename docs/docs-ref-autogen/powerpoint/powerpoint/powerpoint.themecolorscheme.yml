name: PowerPoint.ThemeColorScheme
uid: powerpoint!PowerPoint.ThemeColorScheme:class
package: powerpoint!
fullName: PowerPoint.ThemeColorScheme
summary: Represents a theme color scheme.
remarks: >-
  \[ [API set: PowerPointApi
  1.10](/javascript/api/requirement-sets/powerpoint/powerpoint-api-requirement-sets)
  \]


  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/powerpoint/slide-management/get-set-theme-color-scheme.yaml


  // Resets accent colors on the first slide to default Office theme values and
  updates swatches if present.

  await PowerPoint.run(async (context) => {
    const slide = context.presentation.slides.getItemAt(0);
    const colorScheme: PowerPoint.ThemeColorScheme = slide.themeColorScheme;

    colorScheme.setThemeColor(PowerPoint.ThemeColor.accent1, "#4472C4");
    colorScheme.setThemeColor(PowerPoint.ThemeColor.accent2, "#ED7D31");
    colorScheme.setThemeColor(PowerPoint.ThemeColor.accent3, "#A9D18E");
    colorScheme.setThemeColor(PowerPoint.ThemeColor.accent4, "#FFC000");
    colorScheme.setThemeColor(PowerPoint.ThemeColor.accent5, "#5B9BD5");
    colorScheme.setThemeColor(PowerPoint.ThemeColor.accent6, "#70AD47");
    await context.sync();

    await updateSwatches(context, slide);
    console.log("Accent colors reset to default Office theme values on slide 1.");
  });

  ```

