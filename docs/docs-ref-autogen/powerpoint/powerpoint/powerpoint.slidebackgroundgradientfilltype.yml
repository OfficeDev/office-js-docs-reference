### YamlMime:TSEnum
name: PowerPoint.SlideBackgroundGradientFillType
uid: powerpoint!PowerPoint.SlideBackgroundGradientFillType:enum
package: powerpoint!
fullName: PowerPoint.SlideBackgroundGradientFillType
summary: >-
  Specifies the gradient fill type for a
  [PowerPoint.SlideBackgroundGradientFill](xref:powerpoint!PowerPoint.SlideBackgroundGradientFill:class)<!--
  -->.
remarks: >-
  \[ [API set: PowerPointApi
  1.10](/javascript/api/requirement-sets/powerpoint/powerpoint-api-requirement-sets)
  \]


  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/powerpoint/slide-management/get-set-background-fill.yaml


  // Sets the background of the first selected slide to a linear gradient fill.

  await PowerPoint.run(async (context) => {
    const slide: PowerPoint.Slide = context.presentation.getSelectedSlides().getItemAt(0);
    slide.background.fill.setGradientFill({
      type: PowerPoint.SlideBackgroundGradientFillType.linear,
    } as PowerPoint.SlideBackgroundGradientFillOptions);
    await context.sync();

    console.log("Background set to linear gradient fill.");
  });

  ```

