name: PowerPoint.SlideBackgroundPictureOrTextureFillOptions
uid: powerpoint!PowerPoint.SlideBackgroundPictureOrTextureFillOptions:interface
package: powerpoint!
fullName: PowerPoint.SlideBackgroundPictureOrTextureFillOptions
summary: >-
  Represents
  [PowerPoint.SlideBackground](xref:powerpoint!PowerPoint.SlideBackground:class)
  picture or texture fill options.
remarks: >-
  \[ [API set: PowerPointApi
  1.10](/javascript/api/requirement-sets/powerpoint/powerpoint-api-requirement-sets)
  \]


  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/powerpoint/slide-management/get-set-background-fill.yaml


  // Sets the background of the first selected slide to a picture fill at 60%
  transparency.

  // Uses a sample image from a Base64-encoded string.

  await PowerPoint.run(async (context) => {
    const slide: PowerPoint.Slide = context.presentation.getSelectedSlides().getItemAt(0);
    slide.background.fill.setPictureOrTextureFill({
      imageBase64: getSampleImageAsBase64String(),
      transparency: 0.6,
    } as PowerPoint.SlideBackgroundPictureOrTextureFillOptions);
    await context.sync();

    console.log("Background set to picture fill (60% transparent).");
  });

  ```

