name: PowerPoint.RequestContext
uid: powerpoint!PowerPoint.RequestContext:class
package: powerpoint!
fullName: PowerPoint.RequestContext
summary: The RequestContext object facilitates requests to the PowerPoint application. Since the Office add-in and the PowerPoint application run in two different processes, the request context is required to get access to the PowerPoint object model from the add-in.
remarks: |-



