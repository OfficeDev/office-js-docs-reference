name: Office.ReplyFormData
uid: outlook!Office.ReplyFormData:interface
package: outlook!
fullName: Office.ReplyFormData
summary: A ReplyFormData object that contains body or attachment data and a callback function. Used when displaying a reply form.
remarks: |-
  \[Api set: Mailbox 1.1\]

