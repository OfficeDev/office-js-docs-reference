remarks: |-
  [API set: ExcelApi 1.1](/javascript/api/requirement-sets/excel/excel-api-requirement-sets)



  #### Used by

  - [Excel.Binding](/javascript/api/excel/excel.binding): [type](/javascript/api/excel/excel.binding#excel-excel-binding-type-member)
  - [Excel.BindingCollection](/javascript/api/excel/excel.bindingcollection): [add](/javascript/api/excel/excel.bindingcollection#excel-excel-bindingcollection-add-member(1)), [addFromNamedItem](/javascript/api/excel/excel.bindingcollection#excel-excel-bindingcollection-addfromnameditem-member(1)), [addFromSelection](/javascript/api/excel/excel.bindingcollection#excel-excel-bindingcollection-addfromselection-member(1))
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/excel/30-events/events-disable-events.yaml

  await Excel.run(async (context) => {
      const sheet = context.workbook.worksheets.getItem("Sample");
      const sumRange = sheet.getRange("B20:P20");
      sumRange.load("columnCount");
      await context.sync();

      // add an event handler to each cell in the sum range
      for (let i = 0; i < sumRange.columnCount; i++) {
          let sumBinding = context.workbook.bindings.add(sumRange.getCell(0,i), Excel.BindingType.range, "SumBinding" + i);
          sumBinding.onDataChanged.add(onSumChanged);
      }
      await context.sync();
  });
  ```

