### YamlMime:TSType
name: PowerPoint.RequestContext
uid: powerpoint!PowerPoint.RequestContext:class
package: powerpoint!
fullName: PowerPoint.RequestContext
summary: >-
  The RequestContext object facilitates requests to the PowerPoint application.
  Since the Office add-in and the PowerPoint application run in two different
  processes, the request context is required to get access to the PowerPoint
  object model from the add-in.
remarks: >-



  #### Used by


  - [PowerPoint.Application.context](/javascript/api/powerpoint/powerpoint.application#context-member)

  - [PowerPoint.BulletFormat.context](/javascript/api/powerpoint/powerpoint.bulletformat#context-member)

  - [PowerPoint.ParagraphFormat.context](/javascript/api/powerpoint/powerpoint.paragraphformat#context-member)

  - [PowerPoint.Presentation.context](/javascript/api/powerpoint/powerpoint.presentation#context-member)

  - [PowerPoint.Shape.context](/javascript/api/powerpoint/powerpoint.shape#context-member)

  - [PowerPoint.ShapeCollection.context](/javascript/api/powerpoint/powerpoint.shapecollection#context-member)

  - [PowerPoint.ShapeFill.context](/javascript/api/powerpoint/powerpoint.shapefill#context-member)

  - [PowerPoint.ShapeFont.context](/javascript/api/powerpoint/powerpoint.shapefont#context-member)

  - [PowerPoint.ShapeLineFormat.context](/javascript/api/powerpoint/powerpoint.shapelineformat#context-member)

  - [PowerPoint.Slide.context](/javascript/api/powerpoint/powerpoint.slide#context-member)

  - [PowerPoint.SlideCollection.context](/javascript/api/powerpoint/powerpoint.slidecollection#context-member)

  - [PowerPoint.SlideLayout.context](/javascript/api/powerpoint/powerpoint.slidelayout#context-member)

  - [PowerPoint.SlideLayoutCollection.context](/javascript/api/powerpoint/powerpoint.slidelayoutcollection#context-member)

  - [PowerPoint.SlideMaster.context](/javascript/api/powerpoint/powerpoint.slidemaster#context-member)

  - [PowerPoint.SlideMasterCollection.context](/javascript/api/powerpoint/powerpoint.slidemastercollection#context-member)

  - [PowerPoint.Tag.context](/javascript/api/powerpoint/powerpoint.tag#context-member)

  - [PowerPoint.TagCollection.context](/javascript/api/powerpoint/powerpoint.tagcollection#context-member)

  - [PowerPoint.TextFrame.context](/javascript/api/powerpoint/powerpoint.textframe#context-member)

  - [PowerPoint.TextRange.context](/javascript/api/powerpoint/powerpoint.textrange#context-member)

  #### Examples


  ```TypeScript

  // *.run methods automatically create an OfficeExtension.ClientRequestContext

  // object to work with the Office file.

  await PowerPoint.run(async (context) => {
    const presentation = context.presentation;
    // Interact with the PowerPoint presentation...
  });

  ```

