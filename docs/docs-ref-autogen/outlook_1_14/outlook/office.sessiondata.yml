### YamlMime:TSType
name: Office.SessionData
uid: outlook!Office.SessionData:interface
package: outlook!
fullName: Office.SessionData
summary: |-
  Provides methods to manage an item's session data.

  Session data is specific to a single mail item. It isn't shared among multiple items even if the same add-in is used to set or retrieve data.
remarks: |-
  [API set: Mailbox 1.11](/javascript/api/requirement-sets/outlook/outlook-api-requirement-sets)

  \*\*[Minimum permission level](https://learn.microsoft.com/office/dev/add-ins/outlook/understanding-outlook-add-in-permissions)<!-- -->\*\*: \*\*read item\*\*

  \*\*[Applicable Outlook mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!-- -->\*\*: Compose

  \*\*Important\*\*: In Outlook clients that support Mailbox 1.15 or earlier, the entire SessionData object for each mail item is limited to 50,000 characters per add-in. In clients that support Mailbox 1.16 or later, the character limit per add-in is 2,621,440 characters.

  #### Used by

  - [Office.AppointmentCompose](/javascript/api/outlook/office.appointmentcompose): [sessionData](/javascript/api/outlook/office.appointmentcompose#outlook-office-appointmentcompose-sessiondata-member)
  - [Office.MessageCompose](/javascript/api/outlook/office.messagecompose): [sessionData](/javascript/api/outlook/office.messagecompose#outlook-office-messagecompose-sessiondata-member)
example: []
isPreview: false
isDeprecated: false
type: interface
