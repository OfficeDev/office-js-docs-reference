name: Word.FrameSizeRule
uid: word!Word.FrameSizeRule:enum
package: word!
fullName: Word.FrameSizeRule
summary: >-
  Represents how Word interprets the rule used to determine the height or width
  of a [Word.Frame](xref:word!Word.Frame:class)<!-- -->.
remarks: >-
  \[ [API set: WordApiDesktop
  1.3](/javascript/api/requirement-sets/word/word-api-requirement-sets) \]


  #### Used by


  - <xref uid="word!Word.Frame#heightRule:member"
  alttext="Word.Frame.heightRule" />

  - <xref uid="word!Word.Frame#widthRule:member" alttext="Word.Frame.widthRule"
  />

  - <xref uid="word!Word.Interfaces.FrameData#heightRule:member"
  alttext="Word.Interfaces.FrameData.heightRule" />

  - <xref uid="word!Word.Interfaces.FrameData#widthRule:member"
  alttext="Word.Interfaces.FrameData.widthRule" />

  - <xref uid="word!Word.Interfaces.FrameUpdateData#heightRule:member"
  alttext="Word.Interfaces.FrameUpdateData.heightRule" />

  - <xref uid="word!Word.Interfaces.FrameUpdateData#widthRule:member"
  alttext="Word.Interfaces.FrameUpdateData.widthRule" />

isPreview: false
isDeprecated: false
fields:
  - name: atLeast
    uid: word!Word.FrameSizeRule.atLeast:member
    package: word!
    summary: >-
      The height or width is set to a value equal to or greater than the value
      specified by the `height` property or `width` property.


      * \[ [API set: WordApiDesktop
      1.3](/javascript/api/requirement-sets/word/word-api-requirement-sets) \]
    value: '"AtLeast"'
  - name: auto
    uid: word!Word.FrameSizeRule.auto:member
    package: word!
    summary: >-
      The height or width is set according to the height or width of the item in
      the frame.


      * \[ [API set: WordApiDesktop
      1.3](/javascript/api/requirement-sets/word/word-api-requirement-sets) \]
    value: '"Auto"'
  - name: exact
    uid: word!Word.FrameSizeRule.exact:member
    package: word!
    summary: >-
      The height or width is set to an exact value specified by the `height`
      property or `width` property.


      * \[ [API set: WordApiDesktop
      1.3](/javascript/api/requirement-sets/word/word-api-requirement-sets) \]
    value: '"Exact"'
