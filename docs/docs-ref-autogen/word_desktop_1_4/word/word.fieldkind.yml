### YamlMime:TSEnum
name: Word.FieldKind
uid: word!Word.FieldKind:enum
package: word!
fullName: Word.FieldKind
summary: Represents the kind of [Word.Field](xref:word!Word.Field:class) object. Indicates how the field works in relation to updating.
remarks: |-
  [API set: WordApi 1.5](/javascript/api/requirement-sets/word/word-api-requirement-sets)

  #### Used by

  - [Word.Field](/javascript/api/word/word.field): [kind](/javascript/api/word/word.field#word-word-field-kind-member)
example: []
isPreview: false
isDeprecated: false
fields:
  - name: cold
    uid: word!Word.FieldKind.cold:member
    package: word!
    summary: Represents that the field doesn't have a result.
    value: '"Cold"'
  - name: hot
    uid: word!Word.FieldKind.hot:member
    package: word!
    summary: Represents that the field is automatically updated each time it's displayed or each time the page is reformatted, but which can also be manually updated.
    value: '"Hot"'
  - name: none
    uid: word!Word.FieldKind.none:member
    package: word!
    summary: Represents that the field is invalid. For example, a pair of field characters with nothing inside.
    value: '"None"'
  - name: warm
    uid: word!Word.FieldKind.warm:member
    package: word!
    summary: Represents that the field is automatically updated when the source changes or the field can be manually updated.
    value: '"Warm"'
