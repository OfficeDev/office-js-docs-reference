### YamlMime:TSEnum
name: Word.OperationUnit
uid: word!Word.OperationUnit:enum
package: word!
fullName: Word.OperationUnit
summary: Specifies the unit of measurement used in Word operations.
remarks: |-
  [API set: WordApiDesktop 1.4](/javascript/api/requirement-sets/word/word-api-requirement-sets)


  #### Used by

  - [Word.Selection](/javascript/api/word/word.selection): [expand](/javascript/api/word/word.selection#word-word-selection-expand-member(1)), [extend](/javascript/api/word/word.selection#word-word-selection-extend-member(1))
  - [Word.SelectionDeleteOptions](/javascript/api/word/word.selectiondeleteoptions): [unit](/javascript/api/word/word.selectiondeleteoptions#word-word-selectiondeleteoptions-unit-member)
  - [Word.SelectionMoveLeftRightOptions](/javascript/api/word/word.selectionmoveleftrightoptions): [unit](/javascript/api/word/word.selectionmoveleftrightoptions#word-word-selectionmoveleftrightoptions-unit-member)
  - [Word.SelectionMoveOptions](/javascript/api/word/word.selectionmoveoptions): [unit](/javascript/api/word/word.selectionmoveoptions#word-word-selectionmoveoptions-unit-member)
  - [Word.SelectionMoveStartEndOptions](/javascript/api/word/word.selectionmovestartendoptions): [unit](/javascript/api/word/word.selectionmovestartendoptions#word-word-selectionmovestartendoptions-unit-member)
  - [Word.SelectionMoveUpDownOptions](/javascript/api/word/word.selectionmoveupdownoptions): [unit](/javascript/api/word/word.selectionmoveupdownoptions#word-word-selectionmoveupdownoptions-unit-member)
  - [Word.SelectionNextOptions](/javascript/api/word/word.selectionnextoptions): [unit](/javascript/api/word/word.selectionnextoptions#word-word-selectionnextoptions-unit-member)
  - [Word.SelectionPreviousOptions](/javascript/api/word/word.selectionpreviousoptions): [unit](/javascript/api/word/word.selectionpreviousoptions#word-word-selectionpreviousoptions-unit-member)
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/55-selection/get-previous-next-range.yaml

  // Gets the range of the next word relative to the current selection.
  await Word.run(async (context) => {
    const options: Word.SelectionNextOptions = {
      unit: Word.OperationUnit.word,
      count: 1,
    };
    const nextRange: Word.Range = context.document.selection.getNextRange(options);
    nextRange.load("text");
    await context.sync();

    console.log(`Next word: "${nextRange.text}"`);
  });
  ```

