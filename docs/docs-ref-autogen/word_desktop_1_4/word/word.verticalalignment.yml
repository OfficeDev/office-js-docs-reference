### YamlMime:TSEnum
name: Word.VerticalAlignment
uid: word!Word.VerticalAlignment:enum
package: word!
fullName: Word.VerticalAlignment
summary: Represents the vertical alignment of text.
remarks: >-
  \[ [API set: WordApi
  1.3](/javascript/api/requirement-sets/word/word-api-requirement-sets) \]



  #### Used by


  - <xref
  href="word!Word.Interfaces.TableCellData#verticalAlignment:member">Word.Interfaces.TableCellData.verticalAlignment</xref>

  - <xref
  href="word!Word.Interfaces.TableCellUpdateData#verticalAlignment:member">Word.Interfaces.TableCellUpdateData.verticalAlignment</xref>

  - <xref
  href="word!Word.Interfaces.TableData#verticalAlignment:member">Word.Interfaces.TableData.verticalAlignment</xref>

  - <xref
  href="word!Word.Interfaces.TableRowData#verticalAlignment:member">Word.Interfaces.TableRowData.verticalAlignment</xref>

  - <xref
  href="word!Word.Interfaces.TableRowUpdateData#verticalAlignment:member">Word.Interfaces.TableRowUpdateData.verticalAlignment</xref>

  - <xref
  href="word!Word.Interfaces.TableUpdateData#verticalAlignment:member">Word.Interfaces.TableUpdateData.verticalAlignment</xref>

  - <xref
  href="word!Word.Table#verticalAlignment:member">Word.Table.verticalAlignment</xref>

  - <xref
  href="word!Word.TableCell#verticalAlignment:member">Word.TableCell.verticalAlignment</xref>

  - <xref
  href="word!Word.TableRow#verticalAlignment:member">Word.TableRow.verticalAlignment</xref>

  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/40-tables/manage-formatting.yaml


  // Gets content alignment details about the first row of the first table in
  the document.

  await Word.run(async (context) => {
    const firstTable: Word.Table = context.document.body.tables.getFirst();
    const firstTableRow: Word.TableRow = firstTable.rows.getFirst();
    firstTableRow.load(["horizontalAlignment", "verticalAlignment"]);
    await context.sync();

    console.log(
      `Details about the alignment of the first table's first row:`,
      `- Horizontal alignment of every cell in the row: ${firstTableRow.horizontalAlignment}`,
      `- Vertical alignment of every cell in the row: ${firstTableRow.verticalAlignment}`,
    );
  });

  ```

