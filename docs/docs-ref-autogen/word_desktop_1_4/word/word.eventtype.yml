### YamlMime:TSEnum
name: Word.EventType
uid: word!Word.EventType:enum
package: word!
fullName: Word.EventType
summary: Provides information about the type of a raised event.
remarks: |-
  [API set: WordApi 1.5](/javascript/api/requirement-sets/word/word-api-requirement-sets)



  #### Used by

  - [Word.ContentControlAddedEventArgs](/javascript/api/word/word.contentcontroladdedeventargs): [eventType](/javascript/api/word/word.contentcontroladdedeventargs#word-word-contentcontroladdedeventargs-eventtype-member)
  - [Word.ContentControlDataChangedEventArgs](/javascript/api/word/word.contentcontroldatachangedeventargs): [eventType](/javascript/api/word/word.contentcontroldatachangedeventargs#word-word-contentcontroldatachangedeventargs-eventtype-member)
  - [Word.ContentControlDeletedEventArgs](/javascript/api/word/word.contentcontroldeletedeventargs): [eventType](/javascript/api/word/word.contentcontroldeletedeventargs#word-word-contentcontroldeletedeventargs-eventtype-member)
  - [Word.ContentControlEnteredEventArgs](/javascript/api/word/word.contentcontrolenteredeventargs): [eventType](/javascript/api/word/word.contentcontrolenteredeventargs#word-word-contentcontrolenteredeventargs-eventtype-member)
  - [Word.ContentControlExitedEventArgs](/javascript/api/word/word.contentcontrolexitedeventargs): [eventType](/javascript/api/word/word.contentcontrolexitedeventargs#word-word-contentcontrolexitedeventargs-eventtype-member)
  - [Word.ContentControlSelectionChangedEventArgs](/javascript/api/word/word.contentcontrolselectionchangedeventargs): [eventType](/javascript/api/word/word.contentcontrolselectionchangedeventargs#word-word-contentcontrolselectionchangedeventargs-eventtype-member)
  - [Word.ParagraphAddedEventArgs](/javascript/api/word/word.paragraphaddedeventargs): [type](/javascript/api/word/word.paragraphaddedeventargs#word-word-paragraphaddedeventargs-type-member)
  - [Word.ParagraphChangedEventArgs](/javascript/api/word/word.paragraphchangedeventargs): [type](/javascript/api/word/word.paragraphchangedeventargs#word-word-paragraphchangedeventargs-type-member)
  - [Word.ParagraphDeletedEventArgs](/javascript/api/word/word.paragraphdeletedeventargs): [type](/javascript/api/word/word.paragraphdeletedeventargs#word-word-paragraphdeletedeventargs-type-member)
  #### Examples

  ```TypeScript
  // Link to full sample: https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/word/10-content-controls/content-control-ondeleted-event.yaml

  async function contentControlDeleted(event: Word.ContentControlDeletedEventArgs) {
    await Word.run(async (context) => {
      console.log(`${event.eventType} event detected. IDs of content controls that were deleted:`, event.ids);
    });
  }
  ```

