name: Office.MailboxEnums.ItemType
uid: outlook!Office.MailboxEnums.ItemType:enum
package: outlook!
fullName: Office.MailboxEnums.ItemType
summary: Specifies an item's type.
remarks: >-
  **[Applicable Outlook
  mode](https://learn.microsoft.com/office/dev/add-ins/outlook/outlook-add-ins-overview#extension-points)<!--
  -->**: Compose or Read



  #### Used by


  - <xref
  href="outlook!Office.AppointmentCompose#itemType:member">Office.AppointmentCompose.itemType</xref>

  - <xref
  href="outlook!Office.AppointmentRead#itemType:member">Office.AppointmentRead.itemType</xref>

  - <xref
  href="outlook!Office.LoadedMessageCompose#itemType:member">Office.LoadedMessageCompose.itemType</xref>

  - <xref
  href="outlook!Office.LoadedMessageRead#itemType:member">Office.LoadedMessageRead.itemType</xref>

  - <xref
  href="outlook!Office.MessageCompose#itemType:member">Office.MessageCompose.itemType</xref>

  - <xref
  href="outlook!Office.MessageRead#itemType:member">Office.MessageRead.itemType</xref>

  - <xref
  href="outlook!Office.SelectedItemDetails#itemType:member">Office.SelectedItemDetails.itemType</xref>

  #### Examples


  ```TypeScript

  // Link to full sample:
  https://raw.githubusercontent.com/OfficeDev/office-js-snippets/prod/samples/outlook/90-other-item-apis/get-item-type.yaml


  const itemType = Office.context.mailbox.item.itemType;

  switch (itemType) {
      case Office.MailboxEnums.ItemType.Appointment:
          console.log(`Current item is an ${itemType}.`);
          break;
      case Office.MailboxEnums.ItemType.Message:
          console.log(`Current item is a ${itemType}. A message could be an email, meeting request, meeting response, or meeting cancellation.`);
          break;
  }

  ```

