### YamlMime:TSType
name: Visio.RequestContext
uid: visio!Visio.RequestContext:class
package: visio!
fullName: Visio.RequestContext
summary: >-
  The RequestContext object facilitates requests to the Visio application. Since
  the Office add-in and the Visio application run in two different processes,
  the request context is required to get access to the Visio object model from
  the add-in.
remarks: >-



  #### Used by


  - \[
  [Visio.Application.context](/javascript/api/visio/visio.application#context-member)
  \]

  - \[
  [Visio.Comment.context](/javascript/api/visio/visio.comment#context-member) \]

  - \[
  [Visio.CommentCollection.context](/javascript/api/visio/visio.commentcollection#context-member)
  \]

  - \[
  [Visio.Document.context](/javascript/api/visio/visio.document#context-member)
  \]

  - \[
  [Visio.DocumentView.context](/javascript/api/visio/visio.documentview#context-member)
  \]

  - \[
  [Visio.Hyperlink.context](/javascript/api/visio/visio.hyperlink#context-member)
  \]

  - \[
  [Visio.HyperlinkCollection.context](/javascript/api/visio/visio.hyperlinkcollection#context-member)
  \]

  - \[ [Visio.Page.context](/javascript/api/visio/visio.page#context-member) \]

  - \[
  [Visio.PageCollection.context](/javascript/api/visio/visio.pagecollection#context-member)
  \]

  - \[
  [Visio.PageView.context](/javascript/api/visio/visio.pageview#context-member)
  \]

  - \[
  [Visio.Selection.context](/javascript/api/visio/visio.selection#context-member)
  \]

  - \[ [Visio.Shape.context](/javascript/api/visio/visio.shape#context-member)
  \]

  - \[
  [Visio.ShapeCollection.context](/javascript/api/visio/visio.shapecollection#context-member)
  \]

  - \[
  [Visio.ShapeDataItem.context](/javascript/api/visio/visio.shapedataitem#context-member)
  \]

  - \[
  [Visio.ShapeDataItemCollection.context](/javascript/api/visio/visio.shapedataitemcollection#context-member)
  \]

  - \[
  [Visio.ShapeView.context](/javascript/api/visio/visio.shapeview#context-member)
  \]

  #### Examples


  ```TypeScript

  // *.run methods automatically create an OfficeExtension.ClientRequestContext

  // object to work with the Office file.

  Visio.run(session, function (context) {
      const activePage = context.document.getActivePage();
      // Interact with the Visio page... 

      return context.sync();
  }).catch(function(error) {
      console.log("Error: " + error);
      if (error instanceof OfficeExtension.Error) {
          console.log("Debug info: " + JSON.stringify(error.debugInfo));
      }
  });

  ```

